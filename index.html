<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>与修宁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
html,body{overscroll-behavior:none;overscroll-behavior-y:none;-webkit-overflow-scrolling:auto}
body{font-family:"SimSun","Noto Serif SC",serif;height:100vh;display:flex;justify-content:center;align-items:center;background:#ede8e3;overflow:hidden;position:fixed;width:100%;touch-action:pan-y;-webkit-user-select:none;user-select:none}
#app{width:100%;max-width:100vw;height:100vh;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden;margin:0 auto}
.bg-layer{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0.85}
.content-layer{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;background:rgba(255,255,255,0.75);height:100%;overflow:hidden}
#header{background:rgba(255,255,255,0.9);border-bottom:1px solid #000;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top));display:flex;align-items:center;gap:8px;flex-shrink:0}
#header img{width:30px;height:30px;border-radius:50%;border:1px solid #000;object-fit:cover}
#header .name{font-size:15px;font-weight:600;flex:1}
#narrationBar{display:flex;gap:4px;padding:4px 10px;border-bottom:1px solid #000;background:rgba(255,255,255,0.8);align-items:center;flex-shrink:0}
#narrationInput{flex:1;border:1px solid #000;border-radius:4px;padding:3px 6px;font-size:10px;outline:none;font-family:inherit;background:#fff;-webkit-user-select:text;user-select:text}
#narrationSend{border:1px solid #000;background:#000;color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer}
#archiveBanner{display:none;padding:6px 12px;border-bottom:1px solid #000;font-size:11px;justify-content:space-between;align-items:center;flex-shrink:0;background:#f0f0ff;color:#4040a0}
#archiveBanner button{background:#e0e0ff;border:1px solid #000;padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer}
.chat-area{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 10px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;overscroll-behavior-y:contain;touch-action:pan-y}
.msg-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:3px}
.msg-row.user{justify-content:flex-end}
.msg-row.xn{justify-content:flex-start}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid #000;overflow:hidden;background:#f5f5f5}
.avatar img{width:100%;height:100%;object-fit:cover}
.bubble-wrapper{display:flex;flex-direction:column;min-width:0;flex-shrink:1;max-width:75%}
.bubble-wrapper.user-wrapper{align-items:flex-end}
.bubble-wrapper.xn-wrapper{align-items:flex-start}
.bubble{padding:5px 9px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap;border:1px solid #000;border-radius:5px;overflow-wrap:break-word;writing-mode:horizontal-tb !important;-webkit-user-select:text;user-select:text}
.bubble.user{background:#fff;color:#000}
.bubble.xn{background:#000;color:#fff}
.msg-time{font-size:8px;color:#aaa;margin-top:2px}
.msg-actions{display:flex;gap:3px;margin-top:3px;opacity:0.7;flex-wrap:wrap}
.msg-actions button{background:none;border:none;font-size:9px;cursor:pointer;color:#888;padding:1px 5px}
.narration-msg{text-align:center;color:#555;font-size:12px;padding:8px 16px;margin:6px 0;border-radius:8px;background:#f4f4f9;border:1px dashed #bbb;word-break:break-word;white-space:pre-wrap;max-width:92%;align-self:center;line-height:1.5;-webkit-user-select:text;user-select:text}
.narration-msg .narration-actions{display:flex;justify-content:center;gap:8px;margin-top:5px;flex-wrap:wrap}
.narration-msg .narration-actions button{font-size:10px;background:none;border:none;color:#999;cursor:pointer;padding:2px 6px}
.input-area{border-top:1px solid #000;padding:6px 10px;padding-bottom:calc(6px + env(safe-area-inset-bottom));display:flex;gap:6px;background:rgba(255,255,255,0.9);flex-shrink:0;align-items:flex-end}
.input-area textarea{flex:1;border:1px solid #000;border-radius:6px;padding:6px 10px;font-size:12px;outline:none;resize:none;height:34px;max-height:80px;overflow-y:auto;line-height:1.4;font-family:inherit;background:#fff;color:#000;-webkit-user-select:text;user-select:text;touch-action:pan-y}
.input-area button{background:#000;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer}
.input-area button:disabled{background:#ccc}
#autoToggleBtn{border:1px solid #000;background:#000;color:#fff;padding:4px 8px;font-size:10px;cursor:pointer;border-radius:4px;margin-right:auto;font-family:inherit}
#fileSendBtn{background:#fff;color:#000;border:1px solid #000;padding:4px 8px;font-size:12px;cursor:pointer;border-radius:6px;margin-right:2px}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:6px 10px;align-self:flex-start}
.typing-indicator .typing-avatar{width:24px;height:24px;border-radius:50%;border:1px solid #000;overflow:hidden;flex-shrink:0}
.typing-indicator .typing-avatar img{width:100%;height:100%;object-fit:cover}
.typing-dots{display:flex;gap:4px}
.typing-dots span{width:5px;height:5px;background:#aaa;border-radius:50%;animation:blink 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;touch-action:none}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border:1px solid #000;border-radius:8px;width:90%;max-width:500px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.15);overflow:hidden;touch-action:pan-y}
.setting-tabs{display:flex;border-bottom:1px solid #000;background:#f5f5f5;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;touch-action:pan-x}
.setting-tabs button{flex-shrink:0;padding:10px 14px;font-size:11px;border:none;background:transparent;cursor:pointer;font-family:inherit;color:#666;border-bottom:2px solid transparent;white-space:nowrap}
.setting-tabs button.active{color:#000;border-bottom-color:#000;font-weight:600}
.setting-pages{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px;overscroll-behavior:contain;overscroll-behavior-y:contain;touch-action:pan-y;-webkit-overflow-scrolling:touch}
.setting-page{display:none}
.setting-page.active{display:block}
.setting-page label{font-size:12px;color:#666;display:block;margin-bottom:3px;margin-top:12px}
.setting-page textarea{width:100%;border:1px solid #000;border-radius:4px;padding:10px 12px;font-size:12px;font-family:inherit;resize:vertical;height:100px;background:#fafafa;overflow-y:auto;touch-action:pan-y;overscroll-behavior:contain;-webkit-user-select:text;user-select:text}
.setting-page input[type=text],.setting-page input[type=number]{width:100%;border:1px solid #000;border-radius:4px;padding:8px 12px;font-size:12px;font-family:inherit;background:#fafafa;-webkit-user-select:text;user-select:text}
.setting-page .color-row{display:flex;gap:8px;align-items:center;margin-top:4px}
.setting-page .color-row input[type=color]{width:36px;height:36px;border:1px solid #000;border-radius:4px;cursor:pointer}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;border-top:1px solid #eee;flex-shrink:0;padding:12px 20px}
.modal-btns button{padding:6px 14px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid #000;background:#f5f5f5;font-family:inherit}
.modal-btns .primary{background:#000;color:#fff;border-color:#000}
.modal-btns .danger{background:#c00;color:#fff;border-color:#c00}
.archive-list-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;margin:2px 0;background:#fafafa;border:1px solid #000;border-radius:4px;font-size:11px}
.archive-list-item button{border:1px solid #000;background:#f5f5f5;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;margin-left:4px;font-family:inherit}
.schedule-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin:4px 0;background:#fafafa;border:1px solid #000;border-radius:4px;font-size:11px}
.schedule-item button{border:1px solid #000;background:#f5f5f5;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;margin-left:4px;font-family:inherit}
.crop-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center;touch-action:none}
.crop-overlay.show{display:flex}
.crop-box{background:#fff;border:1px solid #000;border-radius:8px;padding:20px;width:90%;max-width:450px;touch-action:pan-y}
.crop-preview-area{width:100%;height:300px;background:#e0e0e0;margin:10px 0;position:relative;overflow:hidden;border:1px solid #ccc;border-radius:4px;touch-action:none}
#cropImage{position:absolute;top:0;left:0;max-width:none;transform-origin:0 0;pointer-events:none;display:block}
.crop-rect{position:absolute;border:2px solid #f5a623;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);cursor:move;z-index:2;touch-action:none}
.crop-handle{position:absolute;width:24px;height:24px;background:#f5a623;border:2px solid #fff;border-radius:4px;pointer-events:auto;z-index:3;touch-action:none}
.crop-handle.tl{top:-12px;left:-12px;cursor:nwse-resize}
.crop-handle.tr{top:-12px;right:-12px;cursor:nesw-resize}
.crop-handle.bl{bottom:-12px;left:-12px;cursor:nesw-resize}
.crop-handle.br{bottom:-12px;right:-12px;cursor:nwse-resize}
.crop-handle.tm{top:-12px;left:50%;margin-left:-12px;cursor:ns-resize}
.crop-handle.bm{bottom:-12px;left:50%;margin-left:-12px;cursor:ns-resize}
.crop-handle.ml{top:50%;left:-12px;margin-top:-12px;cursor:ew-resize}
.crop-handle.mr{top:50%;right:-12px;margin-top:-12px;cursor:ew-resize}
#toast-container{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast-msg{background:rgba(0,0,0,0.75);color:#fff;padding:7px 18px;border-radius:20px;font-size:12px;font-family:"SimSun","Noto Serif SC",serif;opacity:0;transition:opacity 0.3s;white-space:nowrap;max-width:90vw;text-align:center}
.toast-msg.show{opacity:1}
.storage-bar-wrap{margin-top:12px;padding:10px;background:#f5f5f5;border:1px solid #ddd;border-radius:6px;font-size:11px}
.storage-bar-bg{background:#e0e0e0;border-radius:4px;height:8px;overflow:hidden;margin:6px 0}
.storage-bar-fill{height:100%;border-radius:4px;transition:width 0.3s}
#editModal,.dialog-overlay{z-index:400}
.dialog-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;touch-action:none}
.dialog-overlay.show{display:flex}
.dialog-box{background:#fff;border:1px solid #000;border-radius:8px;width:90%;max-width:420px;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.15);overflow:hidden}
.dialog-title{padding:14px 16px;border-bottom:1px solid #eee;font-weight:600;font-size:14px}
.dialog-body{padding:14px 16px}
.dialog-msg{font-size:13px;line-height:1.6;color:#333;white-space:pre-wrap;word-break:break-word}
.dialog-label{font-size:12px;color:#666;margin-bottom:6px}
.dialog-input{width:100%;height:140px;border:1px solid #000;border-radius:4px;padding:10px;font-family:inherit;font-size:13px;resize:vertical;background:#fafafa;outline:none;-webkit-user-select:text;user-select:text;touch-action:pan-y}
.dialog-input.short{height:60px}
#editModal .modal-box{max-width:420px}
#editModalText{width:100%;height:140px;border:1px solid #000;border-radius:4px;padding:10px;font-family:inherit;font-size:13px;resize:vertical;background:#fafafa;outline:none;-webkit-user-select:text;user-select:text;touch-action:pan-y}
</style>
</head>
<body>
<div id="app">
<div id="bgImg" class="bg-layer" style="background-image:none"></div>
<div class="content-layer">
<div id="header">
<img id="headerHerAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%23d9d9d9'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.3em' font-size='20'%3E蛇%3C/text%3E%3C/svg%3E">
<span class="name">修宁</span>
<img id="headerMyAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%23fce4d6'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.3em' font-size='20'%3E花%3C/text%3E%3C/svg%3E">
<button id="settingsBtn" style="border:1px solid #000;background:#fff;padding:3px 8px;font-size:11px;cursor:pointer;border-radius:4px">设置</button>
</div>
<div id="archiveBanner"><span>存档：<strong id="archiveName"></strong></span><button onclick="exitArchive()">返回主线</button></div>
<div id="narrationBar"><input type="text" id="narrationInput" placeholder="输入旁白..."><button id="narrationSendBtn">发送</button></div>
<div class="chat-area" id="chat"></div>
<div id="typingIndicator" class="typing-indicator" style="display:none">
<div class="typing-avatar"><img id="typingAvatarImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%23d9d9d9'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.3em' font-size='20'%3E蛇%3C/text%3E%3C/svg%3E" style="width:100%;height:100%;object-fit:cover"></div>
<div class="typing-dots"><span></span><span></span><span></span></div>
</div>
<div class="input-area">
<button id="autoToggleBtn">主动</button>
<button id="fileSendBtn">文件</button>
<textarea id="msgInput" placeholder="对修宁说..." rows="1"></textarea>
<button id="sendBtn">发送</button>
</div>
</div>
</div>
<div id="toast-container"></div>
<div class="modal-overlay" id="settingsModal">
<div class="modal-box">
<div class="setting-tabs">
<button class="active" data-tab="tab-basic">基础</button>
<button data-tab="tab-persona">人设</button>
<button data-tab="tab-appearance">外观</button>
<button data-tab="tab-archive">存档</button>
<button data-tab="tab-schedule">定时</button>
<button data-tab="tab-advanced">高级</button>
</div>
<div class="setting-pages">
<div class="setting-page active" id="tab-basic">
<label>API Key</label><input type="text" id="apiKeyEdit" placeholder="sk-...">
<label>模型</label><input type="text" id="modelEdit" placeholder="gpt-3.5-turbo">
<label>她的名字</label><input type="text" id="herNameEdit" placeholder="修宁">
<label>我的名字</label><input type="text" id="myNameEdit" placeholder="我">
<label>上下文条数</label><input type="number" id="ctxCountEdit" min="4" max="100" value="40">
<label>字体大小(px)</label><input type="number" id="fontSizeEdit" min="10" max="22" value="13">
<label>气泡最大宽度(%)</label><input type="number" id="bubbleWidthEdit" min="40" max="95" value="75">
<label>主动消息间隔(分钟，0=关闭)</label><input type="number" id="autoIntervalEdit" min="0" value="5">
<div style="display:flex;gap:8px;margin-top:4px">
<button id="herAvatarBtn" style="flex:1;border:1px solid #000;background:#f5f5f5;padding:6px;font-size:11px;cursor:pointer;border-radius:4px">设置她的头像</button>
<button id="myAvatarBtn" style="flex:1;border:1px solid #000;background:#f5f5f5;padding:6px;font-size:11px;cursor:pointer;border-radius:4px">设置我的头像</button>
</div>
</div>
<div class="setting-page" id="tab-persona">
<label>⚡ 强制修正指令（最高优先级）</label><textarea id="overrideEdit"></textarea>
<label>核心人设</label><textarea id="personaEdit"></textarea>
<label>外貌描写</label><textarea id="appearanceEdit"></textarea>
<label>自我认知</label><textarea id="selfCognitionEdit"></textarea>
<label>世界观</label><textarea id="worldviewEdit"></textarea>
<label>经历/背景故事</label><textarea id="backstoryEdit"></textarea>
<label>与陈幺幺的羁绊</label><textarea id="bondEdit"></textarea>
<label>陈幺幺的人设</label><textarea id="yaoyaoEdit"></textarea>
<label>行动准则与动机</label><textarea id="motivationEdit"></textarea>
<label>关键记忆</label><textarea id="memoriesEdit"></textarea>
</div>
<div class="setting-page" id="tab-appearance">
<label>主题快速应用</label>
<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
<button onclick="applyTheme('light')" style="border:1px solid #000;background:#f5f5f5;padding:4px 10px;font-size:11px;cursor:pointer;border-radius:4px">浅色</button>
<button onclick="applyTheme('dark')" style="border:1px solid #000;background:#222;color:#fff;padding:4px 10px;font-size:11px;cursor:pointer;border-radius:4px">深色</button>
<button onclick="applyTheme('warm')" style="border:1px solid #000;background:#f5e6d3;padding:4px 10px;font-size:11px;cursor:pointer;border-radius:4px">暖色</button>
</div>
<label>背景颜色</label><div class="color-row"><input type="color" id="bgColorPicker" value="#ede8e3"></div>
<label>背景图片</label>
<div style="display:flex;gap:6px;margin-top:4px">
<button onclick="openCrop('bg')" style="flex:1;border:1px solid #000;background:#f5f5f5;padding:6px;font-size:11px;cursor:pointer;border-radius:4px">上传并裁剪背景</button>
<button onclick="clearBackground()" style="border:1px solid #000;background:#f5f5f5;padding:6px 10px;font-size:11px;cursor:pointer;border-radius:4px">清除</button>
</div>
<label>用户气泡颜色</label><div class="color-row"><input type="color" id="userBubbleColorPicker" value="#ffffff"></div>
<label>AI气泡颜色</label><div class="color-row"><input type="color" id="xnBubbleColorPicker" value="#000000"></div>
<label>旁白背景颜色</label><div class="color-row"><input type="color" id="narrationBgColorPicker" value="#f4f4f9"></div>
<label>存档Banner背景色</label><div class="color-row"><input type="color" id="archiveBannerColorPicker" value="#f0f0ff"></div>
<label>存档Banner文字色</label><div class="color-row"><input type="color" id="archiveBannerTextColorPicker" value="#4040a0"></div>
</div>
<div class="setting-page" id="tab-archive">
<label>创建新存档</label><input type="text" id="newArchiveName" placeholder="存档名称（唯一）">
<div style="margin-top:6px"><button id="createArchiveBtn" style="border:1px solid #000;background:#000;color:#fff;padding:6px 14px;font-size:11px;cursor:pointer;border-radius:4px">创建存档</button></div>
<label style="margin-top:14px">存档列表</label><div id="archiveList"></div>
<div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap">
<button onclick="exportArchive()" style="border:1px solid #000;background:#f5f5f5;padding:6px 12px;font-size:11px;cursor:pointer;border-radius:4px">导出当前存档</button>
<label style="margin:0"><input type="file" accept=".json" onchange="handleImport(event)" style="display:none"><button onclick="this.parentElement.querySelector('input').click()" style="border:1px solid #000;background:#f5f5f5;padding:6px 12px;font-size:11px;cursor:pointer;border-radius:4px">导入存档</button></label>
<button onclick="clearCurrentHistory()" style="border:1px solid #c00;color:#c00;background:#fff;padding:6px 12px;font-size:11px;cursor:pointer;border-radius:4px">清空当前记录</button>
</div>
<div id="storageInfo"></div>
</div>
<div class="setting-page" id="tab-schedule">
<label>触发时间 (HH:MM)</label><input type="text" id="scheduleTime" placeholder="例如 08:00 或 9:30">
<label>消息内容</label><textarea id="scheduleContent" placeholder="定时发送的消息..." style="height:60px"></textarea>
<div style="margin-top:6px"><button id="addScheduleBtn" style="border:1px solid #000;background:#000;color:#fff;padding:6px 14px;font-size:11px;cursor:pointer;border-radius:4px">添加定时消息</button></div>
<label style="margin-top:14px">定时列表</label><div id="scheduleList"></div>
</div>
<div class="setting-page" id="tab-advanced">
<label>自定义CSS</label><textarea id="customCssEdit" placeholder="/* 自定义样式 */" style="height:150px;font-family:monospace"></textarea>
</div>
</div>
<div class="modal-btns">
<button onclick="closeSettings()">取消</button>
<button class="primary" onclick="saveSettings()">保存</button>
</div>
</div>
</div>
<div class="crop-overlay" id="cropModal">
<div class="crop-box">
<div style="font-size:13px;font-weight:600;margin-bottom:6px">裁剪图片</div>
<div class="crop-preview-area" id="cropPreviewArea">
<img id="cropImage" style="display:block">
<div class="crop-rect" id="cropRect">
<div class="crop-handle tl" data-handle="tl"></div><div class="crop-handle tr" data-handle="tr"></div>

// ============ 编辑弹窗（保持原有） ============
var _editCallback=null,_editToken=0;
function showEditModal(title,initialText,callback){
  _editToken++;
  var myToken=_editToken;
  document.getElementById("editModalTitle").textContent=title;
  document.getElementById("editModalText").value=initialText||"";
  _editCallback=function(v){if(myToken!==_editToken)return;callback(v);};
  document.getElementById("editModal").classList.add("show");
  setTimeout(function(){
    var ta=document.getElementById("editModalText");
    if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);}
  },50);
}
function _editModalConfirm(){
  var v=document.getElementById("editModalText").value;
  document.getElementById("editModal").classList.remove("show");
  var cb=_editCallback;_editCallback=null;
  if(cb)cb(v);
}
function _editModalCancel(){
  document.getElementById("editModal").classList.remove("show");
  _editCallback=null;_editToken++;
}

// ============ 改造：动态对话框（支持多个叠加，每个独立DOM）============
var _dialogIdCounter=0;

// 通用关闭函数
function _closeDialog(dialogId,callback,result){
  var el=document.getElementById(dialogId);
  if(el&&el.parentNode)el.parentNode.removeChild(el);
  if(callback)callback(result);
}

// 自定义确认弹窗
function showConfirmModal(opts){
  var dialogId="dialog_"+(++_dialogIdCounter);
  var title=opts.title||"确认";
  var msg=opts.message||"";
  var okText=opts.okText||"确定";
  var cancelText=opts.cancelText==null?"取消":opts.cancelText;
  var danger=opts.danger||false;
  var cb=opts.callback||null;
  var stack=document.getElementById("dialogStack");
  var overlay=document.createElement("div");
  overlay.className="dialog-overlay show";
  overlay.id=dialogId;
  var box=document.createElement("div");
  box.className="dialog-box";
  var titleEl=document.createElement("div");
  titleEl.className="dialog-title";
  titleEl.textContent=title;
  box.appendChild(titleEl);
  var body=document.createElement("div");
  body.className="dialog-body";
  var msgEl=document.createElement("div");
  msgEl.className="dialog-msg";
  msgEl.textContent=msg;
  body.appendChild(msgEl);
  box.appendChild(body);
  var btns=document.createElement("div");
  btns.className="modal-btns";
  if(cancelText){
    var cancelBtn=document.createElement("button");
    cancelBtn.textContent=cancelText;
    cancelBtn.onclick=function(ev){ev.stopPropagation();_closeDialog(dialogId,cb,false);};
    btns.appendChild(cancelBtn);
  }
  var okBtn=document.createElement("button");
  okBtn.textContent=okText;
  okBtn.className=danger?"danger":"primary";
  okBtn.onclick=function(ev){ev.stopPropagation();_closeDialog(dialogId,cb,true);};
  btns.appendChild(okBtn);
  box.appendChild(btns);
  // 点击背景关闭：根据opts.dismissible（默认允许）
  var dismissible=(opts.dismissible!==false);
  if(dismissible){
    overlay.onclick=function(ev){
      if(ev.target===overlay){_closeDialog(dialogId,cb,false);}
    };
  }
  overlay.appendChild(box);
  stack.appendChild(overlay);
}

// 兼容性别名
function showAlertModal(message,title){
  showConfirmModal({
    title:title||"提示",
    message:message,
    okText:"确定",
    cancelText:"",
    callback:null,
    dismissible:true
  });
}

// 自定义输入弹窗
function showPromptModal(opts){
  var dialogId="dialog_"+(++_dialogIdCounter);
  var title=opts.title||"输入";
  var label=opts.label||"";
  var defaultValue=opts.defaultValue||"";
  var placeholder=opts.placeholder||"";
  var shortInput=opts.short||false;
  var cb=opts.callback||null;
  var stack=document.getElementById("dialogStack");
  var overlay=document.createElement("div");
  overlay.className="dialog-overlay show";
  overlay.id=dialogId;
  var box=document.createElement("div");
  box.className="dialog-box";
  var titleEl=document.createElement("div");
  titleEl.className="dialog-title";
  titleEl.textContent=title;
  box.appendChild(titleEl);
  var body=document.createElement("div");
  body.className="dialog-body";
  if(label){
    var labelEl=document.createElement("div");
    labelEl.className="dialog-label";
    labelEl.textContent=label;
    body.appendChild(labelEl);
  }
  var ta=document.createElement("textarea");
  ta.className="dialog-input"+(shortInput?" short":"");
  ta.value=defaultValue;
  ta.placeholder=placeholder;
  body.appendChild(ta);
  box.appendChild(body);
  var btns=document.createElement("div");
  btns.className="modal-btns";
  var cancelBtn=document.createElement("button");
  cancelBtn.textContent="取消";
  cancelBtn.onclick=function(ev){ev.stopPropagation();_closeDialog(dialogId,cb,null);};
  btns.appendChild(cancelBtn);
  var okBtn=document.createElement("button");
  okBtn.textContent="确定";
  okBtn.className="primary";
  okBtn.onclick=function(ev){ev.stopPropagation();_closeDialog(dialogId,cb,ta.value);};
  btns.appendChild(okBtn);
  box.appendChild(btns);
  var dismissible=(opts.dismissible!==false);
  if(dismissible){
    overlay.onclick=function(ev){
      if(ev.target===overlay){_closeDialog(dialogId,cb,null);}
    };
  }
  overlay.appendChild(box);
  stack.appendChild(overlay);
  setTimeout(function(){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);},50);
}

// ============ StorageEngine ============
var StorageEngine=(function(){
  var DB_NAME="XiuningDB",DB_VERSION=1,STORE_NAME="kv",KEY_PREFIX="xn_";
  var _cache={},_db=null,_ready=false,_useIDB=false;
  var _pendingWrites={},_writeVersions={};
  var _fullWarned=false;
  function _fk(k){return KEY_PREFIX+k;}
  function _lsRaw(k){try{return localStorage.getItem(KEY_PREFIX+k);}catch(e){return null;}}
  function _lsSetRaw(k,v){try{localStorage.setItem(KEY_PREFIX+k,v);}catch(e){}}
  function _handleFull(){if(_fullWarned)return;_fullWarned=true;toast("⚠️ 存储空间已满！请导出存档后清理历史记录");}
  function _idbSet(fk,val,cb){
    _cache[fk]=val;
    _writeVersions[fk]=(_writeVersions[fk]||0)+1;
    var myVersion=_writeVersions[fk];
    if(_pendingWrites[fk]){
      clearTimeout(_pendingWrites[fk].timer);
      _pendingWrites[fk].val=val;
      _pendingWrites[fk].version=myVersion;
      if(cb)_pendingWrites[fk].cbs.push(cb);
    }else{
      _pendingWrites[fk]={val:val,cbs:cb?[cb]:[],timer:null,version:myVersion};
    }
    _pendingWrites[fk].timer=setTimeout(function(){
      var task=_pendingWrites[fk];
      if(!task||task.version!==myVersion)return;
      delete _pendingWrites[fk];
      var tv=task.val,tcbs=task.cbs;
      if(!_db){
        try{localStorage.setItem(fk,tv);}catch(e){_handleFull();}
        tcbs.forEach(function(f){if(f)f(false);});return;
      }
      try{
        var tx=_db.transaction(STORE_NAME,"readwrite");
        var req=tx.objectStore(STORE_NAME).put({k:fk,v:tv});
        req.onsuccess=function(){tcbs.forEach(function(f){if(f)f(true);});};
        req.onerror=function(){_handleFull();tcbs.forEach(function(f){if(f)f(false);});};
      }catch(e){_handleFull();tcbs.forEach(function(f){if(f)f(false);});}
    },10);
  }
  function _idbRemove(fk,cb){
    delete _cache[fk];
    if(_pendingWrites[fk]){clearTimeout(_pendingWrites[fk].timer);delete _pendingWrites[fk];}
    if(!_db){try{localStorage.removeItem(fk);}catch(e){}if(cb)cb();return;}
    try{
      var tx=_db.transaction(STORE_NAME,"readwrite");
      var req=tx.objectStore(STORE_NAME).delete(fk);
      req.onsuccess=req.onerror=function(){if(cb)cb();};
    }catch(e){if(cb)cb();}
  }
  function _cleanupLocalStorageAfterMigration(){
    if(!_db)return;
    if(_lsRaw("_idb_cleaned")==="1")return;
    setTimeout(function(){
      try{
        var keysToRemove=[];
        for(var i=0;i<localStorage.length;i++){
          var k=localStorage.key(i);
          if(k&&k.indexOf(KEY_PREFIX)===0&&k!==KEY_PREFIX+"_idb_migrated"&&k!==KEY_PREFIX+"_idb_cleaned"){
            keysToRemove.push(k);
          }
        }
        keysToRemove.forEach(function(k){try{localStorage.removeItem(k);}catch(e){}});
        _lsSetRaw("_idb_cleaned","1");
      }catch(e){}
    },5000);
  }
  function _migrateFromLS(cb){
    if(_lsRaw("_idb_migrated")==="1"){_cleanupLocalStorageAfterMigration();if(cb)cb();return;}
    var keys=[];
    try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf(KEY_PREFIX)===0)keys.push(k);}}catch(e){}
    if(keys.length===0){setTimeout(function(){_lsSetRaw("_idb_migrated","1");},200);if(cb)cb();return;}
    var done=0,total=keys.length;
    keys.forEach(function(fk){
      var v=localStorage.getItem(fk);
      _cache[fk]=v;
      if(v!==null&&_db){
        try{
          var tx=_db.transaction(STORE_NAME,"readwrite");
          var req=tx.objectStore(STORE_NAME).put({k:fk,v:v});
          req.onsuccess=req.onerror=function(){
            done++;
            if(done>=total){setTimeout(function(){_lsSetRaw("_idb_migrated","1");},500);_cleanupLocalStorageAfterMigration();if(cb)cb();}
          };
        }catch(e){done++;if(done>=total){setTimeout(function(){_lsSetRaw("_idb_migrated","1");},500);_cleanupLocalStorageAfterMigration();if(cb)cb();}}
      }else{done++;if(done>=total){setTimeout(function(){_lsSetRaw("_idb_migrated","1");},500);_cleanupLocalStorageAfterMigration();if(cb)cb();}}
    });
  }
  function _loadAllToCache(cb){
    if(!_db){if(cb)cb();return;}
    try{
      var tx=_db.transaction(STORE_NAME,"readonly");
      var req=tx.objectStore(STORE_NAME).getAll();
      req.onsuccess=function(){
        (req.result||[]).forEach(function(item){if(item.k&&item.k.indexOf(KEY_PREFIX)===0)_cache[item.k]=item.v;});
        if(cb)cb();
      };
      req.onerror=function(){if(cb)cb();};
    }catch(e){if(cb)cb();}
  }
  function _init(onDone){
    try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf(KEY_PREFIX)===0)_cache[k]=localStorage.getItem(k);}}catch(e){}
    if(!window.indexedDB){_ready=true;_useIDB=false;if(onDone)onDone();return;}
    try{
      var req=window.indexedDB.open(DB_NAME,DB_VERSION);
      req.onupgradeneeded=function(e){var db=e.target.result;if(!db.objectStoreNames.contains(STORE_NAME))db.createObjectStore(STORE_NAME,{keyPath:"k"});};
      req.onsuccess=function(e){
        _db=e.target.result;_useIDB=true;
        _migrateFromLS(function(){_loadAllToCache(function(){_ready=true;if(onDone)onDone();});});
      };
      req.onerror=req.onblocked=function(){_ready=true;_useIDB=false;if(onDone)onDone();};
    }catch(e){_ready=true;_useIDB=false;if(onDone)onDone();}
  }
  function _rawWithFallback(fk){
    var v=_cache[fk];
    if(v!==undefined&&v!==null)return v;
    try{var lv=localStorage.getItem(fk);if(lv!==null)return lv;}catch(e){}
    return null;
  }
  var pub={
    isReady:function(){return _ready;},
    isUsingIDB:function(){return _useIDB;},
    init:_init,
    raw:function(k){return _rawWithFallback(_fk(k));},
    get:function(k,dv){var v=pub.raw(k);if(v===null||v===undefined)return dv;try{return JSON.parse(v);}catch(e){return dv;}},
    setRaw:function(k,v){_idbSet(_fk(k),v,null);},
    set:function(k,v){pub.setRaw(k,JSON.stringify(v));},
    remove:function(k){_idbRemove(_fk(k),null);},
    removeByPrefix:function(prefix){
      var fp=KEY_PREFIX+prefix;
      var keys=Object.keys(_cache).filter(function(k){return k.indexOf(fp)===0;});
      keys.forEach(function(fk){_idbRemove(fk,null);});
      return keys.length;
    },
    flushAll:function(){
      Object.keys(_pendingWrites).forEach(function(fk){
        var task=_pendingWrites[fk];if(!task)return;
        clearTimeout(task.timer);delete _pendingWrites[fk];
        var v=task.val;
        if(_db){try{var tx=_db.transaction(STORE_NAME,"readwrite");tx.objectStore(STORE_NAME).put({k:fk,v:v});}catch(e){try{localStorage.setItem(fk,v);}catch(e2){}}}
        else{try{localStorage.setItem(fk,v);}catch(e){}}
        task.cbs.forEach(function(f){if(f)f(true);});
      });
    },
    getUsage:function(){
      var total=0;
      Object.keys(_cache).forEach(function(k){var v=_cache[k];if(v)total+=(k.length+v.length)*2;});
      var limitMB=_useIDB?500:5;
      return{bytes:total,kb:(total/1024).toFixed(1),mb:(total/1024/1024).toFixed(2),limitMB:limitMB,percent:(total/(limitMB*1024*1024)*100).toFixed(1),engine:_useIDB?"IndexedDB":"localStorage"};
    }
  };
  return pub;
})();
var ls=StorageEngine;

(function(){
  var SCROLLABLE=['.chat-area','.setting-pages','.crop-preview-area','textarea'];
  function findScrollable(el){var cur=el;while(cur&&cur!==document.documentElement){for(var i=0;i<SCROLLABLE.length;i++){if(cur.matches&&cur.matches(SCROLLABLE[i]))return cur;}cur=cur.parentElement;}return null;}
  var _tsY=0,_tsEl=null;
  document.addEventListener('touchstart',function(e){if(e.touches.length===1){_tsY=e.touches[0].clientY;_tsEl=findScrollable(e.target);}},{passive:true});
  document.addEventListener('touchmove',function(e){
    var cropArea=document.getElementById('cropPreviewArea');
    if(cropArea&&cropArea.contains(e.target))return;
    if(!_tsEl){e.preventDefault();return;}
    var dy=e.touches[0].clientY-_tsY;
    var atTop=_tsEl.scrollTop<=0,atBot=_tsEl.scrollTop+_tsEl.clientHeight>=_tsEl.scrollHeight-1;
    if((atTop&&dy>0)||(atBot&&dy<0))e.preventDefault();
  },{passive:false});
})();

}

function ensureMessageMeta(a,b){
  if(!a)return false;
  var changed=false;
  if(!a.id){a.id=generateId();changed=true;}
  if(!a.branchId){a.branchId=b?b.branchId:getCurrentBranchId();changed=true;}
  if(a.parentId===undefined){a.parentId=b?b.id:null;changed=true;}
  if(!a.versionGroupId){a.versionGroupId=a.id;changed=true;}
  if(a.role==="assistant"){if(ensureAllVersions(a))changed=true;}
  return changed;
}

function normalizeHistory(a){
  if(!Array.isArray(a))return{list:[],changed:false};
  var b=[],c=null,changed=false;
  for(var d=0;d<a.length;d++){
    var e=a[d];if(!e)continue;
    if(ensureMessageMeta(e,c))changed=true;
    b.push(e);c=e;
  }
  if(b.length!==a.length)changed=true;
  return{list:b,changed:changed};
}

function getBranchChain(branchId){
  var nh=normalizeHistory(getCurrentHistory());
  var all=nh.list;
  var byId={};all.forEach(function(m){byId[m.id]=m;});
  var byBranch={};all.forEach(function(m){(byBranch[m.branchId]=byBranch[m.branchId]||[]).push(m);});
  var visited={},MAX=500,count=0;
  function build(bid,stopAtId){
    count++;
    if(count>MAX){console.warn("getBranchChain:超深度");delete visited[bid];return[];}
    if(visited[bid]){console.warn("getBranchChain:循环引用="+bid);return[];}
    visited[bid]=true;
    var arr=byBranch[bid]||[],endIdx=arr.length;
    if(stopAtId){var i=arr.findIndex(function(x){return x.id===stopAtId;});if(i>=0)endIdx=i+1;}
    var slice=arr.slice(0,endIdx);
    var root=arr.find(function(x){return x.isBranchRoot;});
    var result;
    if(root&&root.parentId){
      var parent=byId[root.parentId];
      if(parent&&parent.branchId!==bid){
        delete visited[bid];var prefix=build(parent.branchId,parent.id);visited[bid]=true;
        result=prefix.concat(slice);
      }else result=slice;
    }else result=slice;
    delete visited[bid];return result;
  }
  return build(branchId,null);
}

function buildSiblingIndex(){
  var nh=normalizeHistory(getCurrentHistory());
  var all=nh.list;
  _msgById={};var idx={};
  for(var i=0;i<all.length;i++){
    var m=all[i];_msgById[m.id]=m;
    if(!m.versionGroupId)continue;
    if(!idx[m.versionGroupId])idx[m.versionGroupId]=[];
    if(m.isBranchRoot)idx[m.versionGroupId].push(m);
  }
  siblingIndex=idx;
}

function getSiblingBranches(a){
  if(!siblingIndex)buildSiblingIndex();
  var c=_msgById[a];if(!c)return[];
  var roots=siblingIndex[c.versionGroupId]||[];
  if(roots.length===0)return[c];return roots;
}

function switchToBranch(a){currentBranchId=a;setSavedCurrentBranchId(a);invalidateCaches();renderChat();}

function renderChat(){
  try{
    var a=document.getElementById("chat");if(!a)return;
    a.innerHTML="";
    flushPendingHistory();
    var nh=normalizeHistory(getCurrentHistory());
    if(nh.changed)saveCurrentHistory(nh.list);
    buildSiblingIndex();
    var d=getBranchChain(getCurrentBranchId());
    for(var e=0;e<d.length;e++){
      if(d[e].role==="summary")continue;
      if(d[e].role==="narration")appendNarrationMsg(d[e],e,d);
      else appendBubble(d[e],e,d);
    }

}

function buildBranchSwitcher(siblings,container){
  if(!siblings||siblings.length<=1)return;
  // 找到当前分支在兄弟分支里的位置
  var currentIdx=0;
  for(var i=0;i<siblings.length;i++){
    if(siblings[i].branchId===getCurrentBranchId()){currentIdx=i;break;}
  }
  var total=siblings.length;
  var currentNum=currentIdx+1;
  // 上一分支按钮
  var prevBtn=document.createElement("button");
  prevBtn.textContent="<";
  prevBtn.title="上一分支";
  prevBtn.onclick=function(ev){
    ev.stopPropagation();
    var newIdx=(currentIdx-1+total)%total;
    switchToBranch(siblings[newIdx].branchId);
  };
  container.appendChild(prevBtn);
  // 中间显示序号
  var labelSpan=document.createElement("span");
  labelSpan.textContent=currentNum+"/"+total;
  labelSpan.style.fontSize="9px";
  labelSpan.style.color="#666";
  labelSpan.style.margin="0 4px";
  container.appendChild(labelSpan);
  // 下一分支按钮
  var nextBtn=document.createElement("button");
  nextBtn.textContent=">";
  nextBtn.title="下一分支";
  nextBtn.onclick=function(ev){
    ev.stopPropagation();
    var newIdx=(currentIdx+1)%total;
    switchToBranch(siblings[newIdx].branchId);
  };
  container.appendChild(nextBtn);
}

function callAI(messages,onSuccess,onFail){
  if(!ensureApiKey()){if(typeof onFail==="function")onFail();return;}
  if(currentXHR){try{currentXHR.abort();}catch(e){}}
  var xhr=new XMLHttpRequest();currentXHR=xhr;
  xhr.timeout=120000;
  xhr.open("POST",API_URL,true);
  xhr.setRequestHeader("Content-Type","application/json");
  xhr.setRequestHeader("Authorization","Bearer "+getApiKey());
  xhr.onload=function(){
    currentXHR=null;
    if(xhr.status===200){
      var txt="";
      try{var j=JSON.parse(xhr.responseText);if(j.choices&&j.choices[0]&&j.choices[0].message)txt=j.choices[0].message.content.trim();}catch(e){}
      if(!txt){
        toast("⚠️ 模型返回空内容，可能被安全策略拦截，请尝试重试或修改输入");
        txt="（模型未返回内容，请点击重试）";
      }
      onSuccess(txt);
    }else{
      var errMsg="";
      if(xhr.status===401)errMsg="❌ API Key无效，请在设置中检查";
      else if(xhr.status===429)errMsg="⚠️ 请求频繁，请稍后再试";
      else if(xhr.status===403)errMsg="❌ 无权限访问此API";
      else if(xhr.status===500||xhr.status===502||xhr.status===503)errMsg="❌ 服务器错误("+xhr.status+")，请稍后重试";
      else errMsg="❌ 请求失败：HTTP "+xhr.status;
      toast(errMsg);
      if(typeof onFail==="function")onFail();
    }
  };
  xhr.onerror=function(){currentXHR=null;toast("❌ 网络连接失败，请检查网络");if(typeof onFail==="function")onFail();};
  xhr.onabort=function(){currentXHR=null;if(typeof onFail==="function")onFail();};
  xhr.ontimeout=function(){currentXHR=null;toast("⏱️ 请求超时（120秒），请重试");if(typeof onFail==="function")onFail();};
  xhr.send(JSON.stringify({model:getModel(),messages:messages,max_tokens:1000,temperature:0.92}));
}

function buildContextMessages(chain,extraSystem){
  var lastNarration="";
  for(var ni=chain.length-1;ni>=0;ni--){if(chain[ni].role==="narration"){lastNarration=chain[ni].content;break;}}
  var sysContent=buildSystem(lastNarration)+(extraSystem?"\n\n"+extraSystem:"");
  var raw=[];
  var lastWasNarration=false;
  for(var i=0;i<chain.length;i++){
    if(chain[i].role==="narration"){lastWasNarration=true;continue;}
    if(chain[i].role==="summary"){sysContent+="\n\n"+chain[i].content;lastWasNarration=false;continue;}
    raw.push({role:chain[i].role,content:chain[i].content,_breakBefore:lastWasNarration});
    lastWasNarration=false;
  }
  var merged=[];
  for(var k=0;k<raw.length;k++){
    var canMerge=merged.length>0
      && merged[merged.length-1].role===raw[k].role
      && !raw[k]._breakBefore;
    if(canMerge){
      merged[merged.length-1].content+="\n"+raw[k].content;
    }else{
      merged.push({role:raw[k].role,content:raw[k].content});
    }
  }
  var ctxLimit=Math.max(1,getCtxCount()-1);
  var ctx=merged.slice(-ctxLimit);
  var orphans=[];
  while(ctx.length>0&&ctx[0].role==="assistant"){
    orphans.push(ctx[0].content);ctx.shift();
  }
  if(orphans.length>0)sysContent+="\n\n[对话背景]\n"+orphans.join("\n");
  if(ctx.length===0){
    ctx.push({role:"user",content:"（请根据上述背景延续对话）"});
  }
  return [{role:"system",content:sysContent}].concat(ctx);
}

function regenerateMessageById(msgId){
  if(isSending)return;if(!ensureApiKey())return;
  var d=getBranchChain(getCurrentBranchId());
  var aIdx=d.findIndex(function(x){return x.id===msgId;});
  if(aIdx<0)return;
  var c=d[aIdx];if(!c||c.role!=="assistant")return;
  ensureAllVersions(c);
  if(aIdx<=0||(d[aIdx-1].role!=="user"&&d[aIdx-1].role!=="narration"))return;
  isSending=true;regeneratingIdx=-1;setSendBtnStop();showTyping();
  var msgs=buildContextMessages(d.slice(0,aIdx));
  callAI(msgs,function(txt){
    hideTyping();
    var nh=normalizeHistory(getCurrentHistory());var all2=nh.list;
    var r2=all2.find(function(x){return x.id===msgId;});
    if(r2){ensureAllVersions(r2);if(r2.allVersions.indexOf(txt)===-1)r2.allVersions.push(txt);r2.pointer=r2.allVersions.length-1;r2.content=txt;}
    saveCurrentHistory(all2);renderChat();isSending=false;setSendBtnNormal();lastUserMsgTime=Date.now();
  },function(){hideTyping();isSending=false;setSendBtnNormal();});
}

function saveCurrentHistoryDebounced(a){
  _pendingHistory=a;
  _pendingHistoryKey=getCurrentHistoryKey();
  if(_versionSaveTimer)return;
  _versionSaveTimer=setTimeout(function(){
    if(_pendingHistory&&_pendingHistoryKey){
      if(_pendingHistoryKey===getCurrentHistoryKey()){
        ls.set(_pendingHistoryKey.replace("xn_",""),_pendingHistory);
        invalidateCaches();
      }
      _pendingHistory=null;_pendingHistoryKey=null;
    }
    _versionSaveTimer=null;
  },200);
}

function flushPendingHistory(){
  if(_versionSaveTimer){clearTimeout(_versionSaveTimer);_versionSaveTimer=null;}
  if(_pendingHistory&&_pendingHistoryKey){
    if(_pendingHistoryKey===getCurrentHistoryKey()){
      ls.set(_pendingHistoryKey.replace("xn_",""),_pendingHistory);
      invalidateCaches();
    }
    _pendingHistory=null;_pendingHistoryKey=null;
  }
}

  real.pointer=(real.pointer-1+real.allVersions.length)%real.allVersions.length;real.content=real.allVersions[real.pointer];
  saveCurrentHistoryDebounced(all);renderChat();

function getContrast(a){
  if(!a)return"#000";
  var hex=a.replace("#","");
  if(hex.length===3){hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];}
  if(hex.length<6)return"#000";
  var b=parseInt(hex.slice(0,2),16),c=parseInt(hex.slice(2,4),16),d=parseInt(hex.slice(4,6),16);
  if(isNaN(b)||isNaN(c)||isNaN(d))return"#000";
  return(b*0.299+c*0.587+d*0.114)>150?"#000":"#fff";
}

function ensureAllVersions(a){
  if(!a||a.role!=="assistant")return false;
  var changed=false;
  if(!Array.isArray(a.allVersions)){
    if(Array.isArray(a.versions)&&a.versions.length)a.allVersions=[a.content].concat(a.versions);
    else a.allVersions=[a.content];
    a.pointer=0;delete a.versions;
    changed=true;
  }
  if(typeof a.pointer!=="number"||a.pointer<0||a.pointer>=a.allVersions.length){
    a.pointer=a.allVersions.length-1;changed=true;
  }
  if(a.content!==a.allVersions[a.pointer]){
    a.content=a.allVersions[a.pointer];changed=true;
  }
  return changed;
}

function openCrop(a){
  cropType=a;isDraggingRect=false;isDraggingHandle=false;activeHandle=null;_isPinching=false;
  document.getElementById("cropModal").classList.add("show");
  if(_cropTimeout){clearTimeout(_cropTimeout);_cropTimeout=null;}
  var b=document.createElement("input");b.type="file";b.accept="image/*";
  var fileSelected=false;
  b.onchange=function(c){
    var d=c.target.files[0];
    if(_cropTimeout){clearTimeout(_cropTimeout);_cropTimeout=null;}
    if(!d){closeCrop();return;}
    fileSelected=true;
    var e=new FileReader();
    e.onload=function(f){
      var img=document.getElementById("cropImage");
      img.onload=function(){
        cropImageNaturalWidth=img.naturalWidth;cropImageNaturalHeight=img.naturalHeight;
        var area=document.getElementById("cropPreviewArea");var aw=area.clientWidth,ah=area.clientHeight;
        cropImgScale=Math.min(aw/img.naturalWidth,ah/img.naturalHeight);
        cropImgX=(aw-img.naturalWidth*cropImgScale)/2;cropImgY=(ah-img.naturalHeight*cropImgScale)/2;
        if(cropType==="bg"){cropRectW=aw*0.9;cropRectH=ah*0.9;cropRectX=(aw-cropRectW)/2;cropRectY=(ah-cropRectH)/2;}
        else{var s=Math.min(aw,ah)*0.7;cropRectW=cropRectH=s;cropRectX=(aw-s)/2;cropRectY=(ah-s)/2;}
        updateCropDisplay();
      };img.src=f.target.result;
    };e.readAsDataURL(d);
  };
  var checkCancel=function(){
    setTimeout(function(){
      if(!fileSelected){
        var img=document.getElementById("cropImage");
        if(!img||!img.src||img.src===""||img.src===window.location.href)closeCrop();
      }
    },500);
  };
  window.addEventListener("focus",checkCancel,{once:true});
  _cropTimeout=setTimeout(function(){
    if(!fileSelected){
      var img=document.getElementById("cropImage");
      if(!img||!img.src||img.src===""||img.src===window.location.href){
        closeCrop();
      }
    }
    _cropTimeout=null;
  },8000);
  b.click();
}

function updateCropDisplay(){
  var a=document.getElementById("cropImage");var b=document.getElementById("cropRect");
  a.style.transform="translate("+cropImgX+"px, "+cropImgY+"px) scale("+cropImgScale+")";a.style.transformOrigin="0 0";
  b.style.left=cropRectX+"px";b.style.top=cropRectY+"px";b.style.width=cropRectW+"px";b.style.height=cropRectH+"px";
}

function closeCrop(){
  if(_cropTimeout){clearTimeout(_cropTimeout);_cropTimeout=null;}
  document.getElementById("cropModal").classList.remove("show");
  isDraggingRect=false;isDraggingHandle=false;activeHandle=null;_isPinching=false;
  var img=document.getElementById("cropImage");if(img)img.src="";
  cropImgScale=1;cropImgX=0;cropImgY=0;cropRectX=0;cropRectY=0;cropRectW=100;cropRectH=100;
  cropImageNaturalWidth=0;cropImageNaturalHeight=0;
}

function confirmCrop(){
  var a=document.getElementById("cropImage");if(!a.src||!a.naturalWidth){toast("请先上传图片");return;}
  var b=(cropRectX-cropImgX)/cropImgScale;var c=(cropRectY-cropImgY)/cropImgScale;
  var d=cropRectW/cropImgScale,e=cropRectH/cropImgScale;
  b=Math.max(0,b);c=Math.max(0,c);d=Math.min(d,cropImageNaturalWidth-b);e=Math.min(e,cropImageNaturalHeight-c);
  if(cropType==="my"||cropType==="her"){var ff=Math.min(d,e);d=ff;e=ff;}
  if(d<=0||e<=0){toast("裁剪区域无效");return;}
  var cw,ch;
  if(cropType==="bg"){var maxSide=1280;var ratio=Math.min(1,maxSide/Math.max(d,e));cw=Math.round(d*ratio);ch=Math.round(e*ratio);}
  else{cw=200;ch=200;}
  var g=document.createElement("canvas");g.width=cw;g.height=ch;
  var h=g.getContext("2d");h.drawImage(a,b,c,d,e,0,0,cw,ch);
  var ii=g.toDataURL("image/jpeg",0.9);
  if(cropType==="my"){_pendingMyAvatar=ii;myAvatarSrc=ii;updateAllAvatars();}
  else if(cropType==="her"){_pendingHerAvatar=ii;herAvatarSrc=ii;updateAllAvatars();}
  else if(cropType==="bg"){bgImageUrl=ii;ls.setRaw(getPrefixed("bg"),ii);applyAppearance();}
  closeCrop();toast("裁剪完成 ✓");
}

function _getPinchDist(t1,t2){
  var dx=t1.clientX-t2.clientX,dy=t1.clientY-t2.clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

function bindCropEvents(){
  var area=document.getElementById("cropPreviewArea");var rect=document.getElementById("cropRect");
  rect.addEventListener("mousedown",function(c){if(c.target===rect){isDraggingRect=true;dragStartX=c.clientX;dragStartY=c.clientY;dragStartRectX=cropRectX;dragStartRectY=cropRectY;c.preventDefault();}});
  rect.addEventListener("touchstart",function(c){if(c.target===rect&&c.touches.length===1){isDraggingRect=true;dragStartX=c.touches[0].clientX;dragStartY=c.touches[0].clientY;dragStartRectX=cropRectX;dragStartRectY=cropRectY;c.preventDefault();}},{passive:false});
  area.addEventListener("touchstart",function(c){
    if(c.touches.length===2){
      _isPinching=true;
      isDraggingRect=false;isDraggingHandle=false;
      _pinchInitDist=_getPinchDist(c.touches[0],c.touches[1]);
      _pinchInitScale=cropImgScale;
      var areaRect=area.getBoundingClientRect();
      _pinchCenterX=(c.touches[0].clientX+c.touches[1].clientX)/2-areaRect.left;
      _pinchCenterY=(c.touches[0].clientY+c.touches[1].clientY)/2-areaRect.top;
      _pinchInitImgX=cropImgX;_pinchInitImgY=cropImgY;
      c.preventDefault();
    }
  },{passive:false});
  window.addEventListener("mousemove",function(c){if(isDraggingRect){cropRectX=dragStartRectX+c.clientX-dragStartX;cropRectY=dragStartRectY+c.clientY-dragStartY;updateCropDisplay();}if(isDraggingHandle){handleResize(c.clientX,c.clientY);updateCropDisplay();}});
  window.addEventListener("touchmove",function(c){
    if(_isPinching&&c.touches.length===2){
      var newDist=_getPinchDist(c.touches[0],c.touches[1]);
      if(_pinchInitDist>0){
        var newScale=Math.max(0.2,Math.min(5,_pinchInitScale*(newDist/_pinchInitDist)));
        var ratio=newScale/_pinchInitScale;
        cropImgX=_pinchCenterX-(_pinchCenterX-_pinchInitImgX)*ratio;
        cropImgY=_pinchCenterY-(_pinchCenterY-_pinchInitImgY)*ratio;
        cropImgScale=newScale;
        updateCropDisplay();
      }
      c.preventDefault();return;
    }
    if(isDraggingRect&&c.touches.length===1){cropRectX=dragStartRectX+c.touches[0].clientX-dragStartX;cropRectY=dragStartRectY+c.touches[0].clientY-dragStartY;updateCropDisplay();c.preventDefault();}
    if(isDraggingHandle&&c.touches.length===1){handleResize(c.touches[0].clientX,c.touches[0].clientY);updateCropDisplay();c.preventDefault();}
  },{passive:false});
  window.addEventListener("mouseup",function(){isDraggingRect=false;isDraggingHandle=false;activeHandle=null;});
  window.addEventListener("touchend",function(c){
    if(c.touches.length<2)_isPinching=false;
    if(c.touches.length===0){isDraggingRect=false;isDraggingHandle=false;activeHandle=null;}
  });
  rect.querySelectorAll(".crop-handle").forEach(function(d){
    d.addEventListener("mousedown",function(e){isDraggingHandle=true;activeHandle=d.dataset.handle;dragStartX=e.clientX;dragStartY=e.clientY;dragStartRectX=cropRectX;dragStartRectY=cropRectY;dragStartRectW=cropRectW;dragStartRectH=cropRectH;e.stopPropagation();e.preventDefault();});
    d.addEventListener("touchstart",function(e){if(e.touches.length===1){isDraggingHandle=true;activeHandle=d.dataset.handle;dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;dragStartRectX=cropRectX;dragStartRectY=cropRectY;dragStartRectW=cropRectW;dragStartRectH=cropRectH;e.stopPropagation();e.preventDefault();}},{passive:false});
  });
  area.addEventListener("wheel",function(b){b.preventDefault();var c=b.deltaY>0?-0.05:0.05;var d=Math.max(0.2,Math.min(5,cropImgScale+c));var e=area.getBoundingClientRect();var f=b.clientX-e.left,gg=b.clientY-e.top;var hh=d/cropImgScale;cropImgX=f-(f-cropImgX)*hh;cropImgY=gg-(gg-cropImgY)*hh;cropImgScale=d;updateCropDisplay();},{passive:false});
}

function handleResize(a,b){
  var c=a-dragStartX,d=b-dragStartY,e=50;
  switch(activeHandle){
    case"tl":cropRectX=dragStartRectX+c;cropRectY=dragStartRectY+d;cropRectW=dragStartRectW-c;cropRectH=dragStartRectH-d;break;
    case"tr":cropRectY=dragStartRectY+d;cropRectW=dragStartRectW+c;cropRectH=dragStartRectH-d;break;
    case"bl":cropRectX=dragStartRectX+c;cropRectW=dragStartRectW-c;cropRectH=dragStartRectH+d;break;
    case"br":cropRectW=dragStartRectW+c;cropRectH=dragStartRectH+d;break;
    case"tm":cropRectY=dragStartRectY+d;cropRectH=dragStartRectH-d;break;
    case"bm":cropRectH=dragStartRectH+d;break;
    case"ml":cropRectX=dragStartRectX+c;cropRectW=dragStartRectW-c;break;
    case"mr":cropRectW=dragStartRectW+c;break;
  }
  if(cropRectW<e){cropRectW=e;if(activeHandle.indexOf("l")>=0)cropRectX=dragStartRectX+dragStartRectW-e;}
  if(cropRectH<e){cropRectH=e;if(activeHandle.indexOf("t")>=0)cropRectY=dragStartRectY+dragStartRectH-e;}
}

function applyTheme(a){
  var presets={dark:["#1a1a1a","#333333","#ffffff","#2a2a2a","#2a2a2a","#cccccc"],light:["#ffffff","#f0f0f0","#000000","#eef2ff","#dde7ff","#1f3a8a"],warm:["#f5e6d3","#fff8f0","#4a2c1a","#f0e6d3","#e8d4b0","#3a2010"]};
  var p=presets[a];if(!p)return;
  bgColor=p[0];userBubbleColor=p[1];xnBubbleColor=p[2];narrationMsgBg=p[3];archiveBannerColor=p[4];archiveBannerTextColor=p[5];
  ls.setRaw(getPrefixed("bgColor"),bgColor);ls.setRaw(getPrefixed("userBubbleColor"),userBubbleColor);ls.setRaw(getPrefixed("xnBubbleColor"),xnBubbleColor);ls.setRaw(getPrefixed("narrationBgColor"),narrationMsgBg);ls.setRaw(getPrefixed("archiveBannerColor"),archiveBannerColor);ls.setRaw(getPrefixed("archiveBannerTextColor"),archiveBannerTextColor);
  var ids=["bgColorPicker","userBubbleColorPicker","xnBubbleColorPicker","narrationBgColorPicker","archiveBannerColorPicker","archiveBannerTextColorPicker"];
  ids.forEach(function(id,i){var el=document.getElementById(id);if(el)el.value=p[i];});
  applyAppearance();renderChat();
}

function clearBackground(){bgImageUrl=null;ls.remove(getPrefixed("bg"));applyAppearance();}

function exportArchive(){
  var settings={herName:getHerName(),myName:getMyName(),fontSize:fontSize,bubbleWidth:bubbleWidth};
  PERSONA_KEYS.forEach(function(k){settings[k]=ls.raw(getPrefixed(k))||"";});
  APPEARANCE_KEYS.forEach(function(k){settings[k]=ls.raw(getPrefixed(k))||"";});
  settings.myAvatar=_pendingMyAvatar||ls.raw(getPrefixed("myAvatar"))||"";
  settings.herAvatar=_pendingHerAvatar||ls.raw(getPrefixed("herAvatar"))||"";
  var bgData=ls.raw(getPrefixed("bg"))||"";
  if(bgData.length>100*1024){
    showConfirmModal({
      title:"背景图较大",
      message:"背景图约 "+(Math.round(bgData.length/1024))+"KB，是否包含进导出文件？\n（不含可减少文件大小）",
      okText:"包含背景图",
      cancelText:"不含背景",
      callback:function(includeBg){
        _doExport(settings,includeBg?bgData:"");
      }
    });
    return;
  }
  _doExport(settings,bgData);
}

function _doExport(settings,bgData){
  settings.bg=bgData;
  var exportObj={time:new Date().toISOString(),archive:currentArchive,messages:getCurrentHistory(),settings:settings};
  var jsonStr=JSON.stringify(exportObj,null,2);
  var filename="xiuning_"+currentArchive.replace(/[^\w\-]/g,"_")+"_"+new Date().toISOString().slice(0,10)+".json";
  try{
    var blob=new Blob([jsonStr],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var link=document.createElement("a");link.href=url;link.download=filename;
    document.body.appendChild(link);link.click();document.body.removeChild(link);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    toast("导出成功 ✓");
  }catch(e1){
    try{
      var b64=btoa(unescape(encodeURIComponent(jsonStr)));
      var dataUrl="data:application/json;base64,"+b64;
      var link2=document.createElement("a");link2.href=dataUrl;link2.download=filename;
      document.body.appendChild(link2);link2.click();document.body.removeChild(link2);
      toast("导出成功 ✓");
    }catch(e2){
      toast("自动下载失败，请手动复制控制台数据");
      console.log("【导出数据】",jsonStr);
    }
  }
}

function handleImport(a){
  var b=a.target.files[0];if(!b)return;
  var c=new FileReader();
  c.onload=function(d){
    try{
      var e=JSON.parse(d.target.result);if(!e.messages)throw new Error("无messages字段");
      var doImport=function(){
        if(e.settings){
          if(e.settings.herName)ls.setRaw("herName",e.settings.herName);if(e.settings.myName)ls.setRaw("myName",e.settings.myName);
          if(e.settings.fontSize)ls.set(getPrefixed("fontSize"),e.settings.fontSize);if(e.settings.bubbleWidth)ls.set(getPrefixed("bubbleWidth"),e.settings.bubbleWidth);
          PERSONA_KEYS.forEach(function(k){if(e.settings[k]!==undefined)ls.setRaw(getPrefixed(k),e.settings[k]||"");});
          APPEARANCE_KEYS.forEach(function(k){if(e.settings[k])ls.setRaw(getPrefixed(k),e.settings[k]);});
          if(e.settings.myAvatar)ls.setRaw(getPrefixed("myAvatar"),e.settings.myAvatar);
          if(e.settings.herAvatar)ls.setRaw(getPrefixed("herAvatar"),e.settings.herAvatar);
          if(e.settings.bg)ls.setRaw(getPrefixed("bg"),e.settings.bg);
        }
        var nh=normalizeHistory(e.messages);
        saveCurrentHistory(nh.list);currentBranchId="main";setSavedCurrentBranchId("main");invalidateCaches();
        reloadAllSettings();applyAppearance();renderChat();
        if(isSettingsOpen())openSettings();toast("导入成功 ✓");
      };
      if(e.archive&&e.archive!==currentArchive){
        showConfirmModal({
          title:"确认导入",
          message:"该存档属于「"+e.archive+"」，确定导入到当前位置吗？",
          okText:"导入",
          callback:function(ok){if(ok)doImport();}
        });
      }else{
        doImport();
      }
    }catch(f){toast("格式错误："+f.message);}
  };c.readAsText(b);a.target.value="";
}

function autoResize(el){
  el.style.height="34px";
  el.style.overflowY="hidden";
  var h=el.scrollHeight;
  el.style.height=Math.max(34,Math.min(h,80))+"px";
  el.style.overflowY=h>80?"auto":"hidden";
}

function handleKey(a){if(a.key==="Enter"&&!a.shiftKey){if(a.isComposing||a.keyCode===229)return;a.preventDefault();sendMsg();}}
function handleNarrationKey(a){if(a.key==="Enter"){if(a.isComposing||a.keyCode===229)return;a.preventDefault();sendNarration();}}
function clearCurrentHistory(){
  showConfirmModal({
    title:"确认清空",
    message:"清空当前所有聊天记录？此操作不可恢复。",
    okText:"清空",
    danger:true,
    callback:function(ok){
      if(!ok)return;
      saveCurrentHistory([]);currentBranchId="main";setSavedCurrentBranchId("main");invalidateCaches();renderChat();
      toast("已清空");
    }
  });
}

function migrateOldHistory(){
  var a=getCurrentHistory();if(!Array.isArray(a)||a.length===0)return;
  var b=false,c=null;
  for(var d=0;d<a.length;d++){
    var e=a[d];
    if(!e.id){e.id=generateId();b=true;}if(!e.branchId){e.branchId="main";b=true;}
    if(e.parentId===undefined){if(c&&c.branchId===e.branchId)e.parentId=c.id;else e.parentId=null;b=true;}
    if(!e.versionGroupId){e.versionGroupId=e.id;b=true;}
    if(e.role==="assistant")ensureAllVersions(e);c=e;
  }
  var idMap={};a.forEach(function(m){idMap[m.id]=m;});var lastInBranch={};
  for(var i=0;i<a.length;i++){
    var m=a[i];
    if(m.parentId){
      var par=idMap[m.parentId];var bad=false;
      if(par){
        if(m.isBranchRoot&&par.branchId===m.branchId){bad=true;}
        else if(!m.isBranchRoot&&par.branchId!==m.branchId){bad=true;}
      }else{bad=true;}
      if(bad){m.parentId=lastInBranch[m.branchId]?lastInBranch[m.branchId].id:null;b=true;}
    }
    lastInBranch[m.branchId]=m;
  }
  if(b)saveCurrentHistory(a);
}

function bind(a,b,c){var d=document.getElementById(a);if(d)d[b]=c;else console.warn("missing element:",a);}

  try{
    bind("settingsBtn","onclick",openSettings);bind("sendBtn","onclick",sendMsg);bind("fileSendBtn","onclick",sendFile);
    bind("myAvatarBtn","onclick",function(){openCrop("my");});bind("herAvatarBtn","onclick",function(){openCrop("her");});

    var b=document.getElementById("settingsModal");if(b)b.onclick=function(a){if(a.target===this)closeSettings();};
    var cr=document.getElementById("cropModal");if(cr)cr.onclick=function(a){if(a.target===this)closeCrop();};
    document.querySelectorAll(".setting-tabs button").forEach(function(a){a.onclick=function(){switchSettingTab(this.dataset.tab);};});
    currentArchive=getCurrentArchive();
    currentBranchId=getSavedCurrentBranchId();
    migrateOldHistory();
    reloadAllSettings();
    updateArchiveBanner();
    setInterval(checkSchedule,10000);
    setTimeout(checkSchedule,1000);
    if(typeof bindCropEvents==="function")bindCropEvents();
    var u=StorageEngine.getUsage();
    console.log("[Storage] 引擎:"+u.engine+" 用量:"+u.mb+"MB/"+u.limitMB+"MB ("+u.percent+"%)");
  }catch(d){console.error("_appInit error:",d);}
}// 收到"修宁"的消息时
