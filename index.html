<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>与修宁</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"SimSun","Noto Serif SC",serif;
  height:100vh;display:flex;justify-content:center;align-items:center;
  background:#ede8e3;
  overscroll-behavior:none;
  overflow:hidden;
  position:fixed;
  width:100%;
  touch-action:pan-y;
}
#app{
  width:100%;max-width:100vw;height:100vh;
  display:flex;flex-direction:column;
  background:#fff;position:relative;overflow:hidden;
  margin:0 auto;
}
.bg-layer{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0.85}
.content-layer{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;background:rgba(255,255,255,0.75);height:100%;overflow:hidden}
#header{background:rgba(255,255,255,0.9);border-bottom:1px solid #000;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
#header img{width:30px;height:30px;border-radius:50%;border:1px solid #000;object-fit:cover}
#header .name{font-size:15px;font-weight:600;flex:1}
#narrationBar{display:flex;gap:4px;padding:4px 10px;border-bottom:1px solid #000;background:rgba(255,255,255,0.8);align-items:center;flex-shrink:0}
#narrationInput{flex:1;border:1px solid #000;border-radius:4px;padding:3px 6px;font-size:10px;outline:none;font-family:inherit;background:#fff}
#narrationSend{border:1px solid #000;background:#000;color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer}
#narrationDisplay{padding:3px 10px;border-bottom:1px solid #000;font-size:10px;color:#666;background:rgba(255,255,255,0.6);font-style:italic;display:none;cursor:pointer}
#archiveBanner{display:none;padding:6px 12px;border-bottom:1px solid #000;font-size:11px;justify-content:space-between;align-items:center;flex-shrink:0;background:#f0f0ff;color:#4040a0}
#archiveBanner button{background:#e0e0ff;border:1px solid #000;padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer}
.chat-area{
  flex:1;overflow-y:auto;
  padding:12px 10px;
  display:flex;flex-direction:column;gap:8px;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:none;
  touch-action:pan-y;
}
.msg-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:3px}
.msg-row.user{justify-content:flex-end}
.msg-row.xn{justify-content:flex-start}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid #000;overflow:hidden;background:#f5f5f5}
.avatar img{width:100%;height:100%;object-fit:cover}
.bubble-wrapper{display:flex;flex-direction:column;min-width:0;flex-shrink:1;max-width:75%}
.bubble-wrapper.user-wrapper{align-items:flex-end}
.bubble-wrapper.xn-wrapper{align-items:flex-start}
.bubble{padding:5px 9px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap;border:1px solid #000;border-radius:5px;overflow-wrap:break-word;writing-mode:horizontal-tb !important}
.bubble.user{background:#fff;color:#000}
.bubble.xn{background:#000;color:#fff}
.msg-time{font-size:8px;color:#aaa;margin-top:2px}
.msg-actions{display:flex;gap:3px;margin-top:3px;opacity:0.7;flex-wrap:wrap}
.msg-actions button{background:none;border:none;font-size:9px;cursor:pointer;color:#888;padding:1px 5px}
.input-area{border-top:1px solid #000;padding:6px 10px;display:flex;gap:6px;background:rgba(255,255,255,0.9);flex-shrink:0;align-items:flex-end}
.input-area textarea{flex:1;border:1px solid #000;border-radius:6px;padding:6px 10px;font-size:12px;outline:none;resize:none;height:34px;max-height:80px;overflow-y:auto;line-height:1.4;font-family:inherit;background:#fff;color:#000}
.input-area button{background:#000;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer}
.input-area button:disabled{background:#ccc}
#autoToggle{border:1px solid #000;background:#000;color:#fff;padding:4px 8px;font-size:10px;cursor:pointer;border-radius:4px;margin-right:auto;font-family:inherit}
#fileSendBtn{background:#fff;color:#000;border:1px solid #000;padding:4px 8px;font-size:12px;cursor:pointer;border-radius:6px;margin-right:2px}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:6px 10px;align-self:flex-start}
.typing-indicator .typing-avatar{width:24px;height:24px;border-radius:50%;border:1px solid #000;overflow:hidden;flex-shrink:0}
.typing-indicator .typing-avatar img{width:100%;height:100%;object-fit:cover}
.typing-dots{display:flex;gap:4px}
.typing-dots span{width:5px;height:5px;background:#aaa;border-radius:50%;animation:blink 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

/* 设置弹窗 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border:1px solid #000;border-radius:8px;width:90%;max-width:500px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.15);overflow:hidden}
.setting-tabs{display:flex;border-bottom:1px solid #000;background:#f5f5f5;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.setting-tabs button{flex-shrink:0;padding:10px 14px;font-size:11px;border:none;background:transparent;cursor:pointer;font-family:inherit;color:#666;border-bottom:2px solid transparent;white-space:nowrap}
.setting-tabs button.active{color:#000;border-bottom-color:#000;font-weight:600}
.setting-pages{flex:1;overflow-y:auto;padding:20px}
.setting-page{display:none}
.setting-page.active{display:block}
.setting-page label{font-size:12px;color:#666;display:block;margin-bottom:3px;margin-top:12px}
.setting-page label:first-child{margin-top:0}
.setting-page textarea{width:100%;border:1px solid #000;border-radius:4px;padding:10px 12px;font-size:12px;font-family:inherit;resize:vertical;height:100px;background:#fafafa;overflow-y:auto}
.setting-page input[type=text],.setting-page input[type=number]{width:100%;border:1px solid #000;border-radius:4px;padding:8px 12px;font-size:12px;font-family:inherit;background:#fafafa}
.setting-page .color-row{display:flex;gap:8px;align-items:center;margin-top:4px}
.setting-page .color-row input[type=color]{width:36px;height:36px;border:1px solid #000;border-radius:4px;cursor:pointer}
.modal-btns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap;border-top:1px solid #eee;padding-top:12px;flex-shrink:0;padding:12px 20px}
.modal-btns button{padding:6px 14px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid #000;background:#f5f5f5;font-family:inherit}
.modal-btns .primary{background:#000;color:#fff;border-color:#000}
.archive-list-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;margin:2px 0;background:#fafafa;border:1px solid #000;border-radius:4px;font-size:11px}
.archive-list-item button{border:1px solid #000;background:#f5f5f5;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;margin-left:4px;font-family:inherit}
.schedule-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin:4px 0;background:#fafafa;border:1px solid #000;border-radius:4px;font-size:11px}
.schedule-item button{border:1px solid #000;background:#f5f5f5;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;margin-left:4px;font-family:inherit}

/* 裁剪弹窗 */
.crop-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center}
.crop-overlay.show{display:flex}
.crop-box{background:#fff;border:1px solid #000;border-radius:8px;padding:20px;width:90%;max-width:420px}
.crop-preview-area{width:100%;height:280px;background:#e0e0e0;margin:10px 0;position:relative;overflow:hidden;border:1px solid #ccc;border-radius:4px}
.crop-preview-area img{position:absolute;top:0;left:0;max-width:none;transform-origin:0 0;pointer-events:none}
.crop-rect{position:absolute;border:2px solid #f5a623;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);cursor:move;z-index:2}
.crop-handle{position:absolute;width:24px;height:24px;background:#f5a623;border:2px solid #fff;border-radius:4px;pointer-events:auto;z-index:3}
.crop-handle.tl{top:-12px;left:-12px;cursor:nwse-resize}
.crop-handle.tr{top:-12px;right:-12px;cursor:nesw-resize}
.crop-handle.bl{bottom:-12px;left:-12px;cursor:nesw-resize}
.crop-handle.br{bottom:-12px;right:-12px;cursor:nwse-resize}
.crop-handle.tm{top:-12px;left:50%;margin-left:-12px;cursor:ns-resize}
.crop-handle.bm{bottom:-12px;left:50%;margin-left:-12px;cursor:ns-resize}
.crop-handle.ml{top:50%;left:-12px;margin-top:-12px;cursor:ew-resize}
.crop-handle.mr{top:50%;right:-12px;margin-top:-12px;cursor:ew-resize}
</style>

<script>
// 彻底禁止下拉刷新 - 覆盖整个页面
document.addEventListener('touchmove', function(e) {
  // 获取当前滚动的元素
  var target = e.target;
  var scrollable = false;
  
  // 向上查找是否有可滚动的元素（聊天区或弹窗）
  while (target && target !== document.body) {
    var style = window.getComputedStyle(target);
    var overflowY = style.overflowY;
    if (overflowY === 'auto' || overflowY === 'scroll') {
      // 检查是否在弹窗内
      var isModal = target.closest('.modal-box') || target.closest('.crop-box');
      if (isModal) {
        scrollable = true;
        break;
      }
      // 检查是否是聊天区
      if (target.classList.contains('chat-area') || target.classList.contains('setting-pages') || target.classList.contains('archiveList')) {
        scrollable = true;
        break;
      }
    }
    target = target.parentElement;
  }
  
  // 如果当前触摸的不是可滚动区域，阻止默认下拉刷新行为
  if (!scrollable) {
    e.preventDefault();
  }
}, { passive: false });

// 聊天区特殊处理：已经在顶部时再下拉就阻止
var chatArea = document.getElementById('chat');
if (chatArea) {
  chatArea.addEventListener('touchstart', function(e) {
    this._startScrollTop = this.scrollTop;
  });
  chatArea.addEventListener('touchmove', function(e) {
    var scrollTop = this.scrollTop;
    // 如果已经在最顶部并且还在下拉，阻止
    if (scrollTop <= 0 && this._startScrollTop <= 0 && e.touches[0].clientY > this._lastTouchY) {
      // 这个判断不精确，用preventDefault替代
    }
    this._lastTouchY = e.touches[0].clientY;
  });
}

var API_URL = "https://api.gemai.cc/v1/chat/completions";
var ls = {get:function(k,d){try{var v=localStorage.getItem("xn_"+k);return v?JSON.parse(v):d}catch(e){return d}},set:function(k,v){try{localStorage.setItem("xn_"+k,JSON.stringify(v))}catch(e){}},raw:function(k){try{return localStorage.getItem("xn_"+k)}catch(e){return null}},setRaw:function(k,v){try{localStorage.setItem("xn_"+k,v)}catch(e){}}};

// 定时消息
function addSchedule(){
  var timeInput = document.getElementById("scheduleTime");
  var contentInput = document.getElementById("scheduleContent");
  var time = timeInput.value.trim();
  var content = contentInput.value.trim();
  if (!time || !content) return alert("请同时填写时间和内容。");
  time = time.replace(/：/g, ":");
  var pattern = /^([01]\d|2[0-3]):[0-5]\d$/;
  if (!pattern.test(time)) return alert("时间格式错误！请使用24小时制，例如：\n08:00（早上8点）\n12:00（中午12点）\n22:30（晚上10点半）");
  var list = getScheduleList();
  list.push({ time: time, content: content });
  saveScheduleList(list);
  timeInput.value = ""; contentInput.value = "";
  renderScheduleList();
  alert("定时消息已添加！将在每天 " + time + " 发送。");
}
function removeSchedule(idx){ var list = getScheduleList(); list.splice(idx, 1); saveScheduleList(list); renderScheduleList(); }
function renderScheduleList(){
  var container = document.getElementById("scheduleList");
  var list = getScheduleList();
  var html = "";
  for (var i = 0; i < list.length; i++) {
    var s = list[i];
    html += '<div class="schedule-item"><span>' + s.time + ' - ' + s.content.slice(0, 30) + (s.content.length > 30 ? '...' : '') + '</span><button onclick="removeSchedule(' + i + ')" style="color:#c00;">删除</button></div>';
  }
  if (list.length === 0) html = '<div style="font-size:10px;color:#999;text-align:center;">暂无定时消息</div>';
  container.innerHTML = html;
}
function checkSchedule(){
  var now = new Date();
  var currentTime = ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2);
  var list = getScheduleList();
  for (var i = list.length - 1; i >= 0; i--) {
    if (list[i].time === currentTime) {
      var h = getCurrentHistory();
      h.push({ role: "assistant", content: list[i].content });
      saveCurrentHistory(h); renderChat();
      list.splice(i, 1); saveScheduleList(list); renderScheduleList();
    }
  }
}

function closeCrop(){document.getElementById("cropModal").classList.remove("show")}
function confirmCrop(){var img=document.getElementById("cropImage");var sx=(cropRectX-cropImgX)/cropImgScale;var sy=(cropRectY-cropImgY)/cropImgScale;var sw=cropRectW/cropImgScale,sh=cropRectH/cropImgScale;sx=Math.max(0,Math.min(sx,cropImageNaturalWidth-sw));sy=Math.max(0,Math.min(sy,cropImageNaturalHeight-sh));if(sx+sw>cropImageNaturalWidth)sw=cropImageNaturalWidth-sx;if(sy+sh>cropImageNaturalHeight)sh=cropImageNaturalHeight-sy;var cropSize=Math.min(sw,sh);sw=cropSize;sh=cropSize;var canvas=document.createElement("canvas");canvas.width=200;canvas.height=200;var ctx=canvas.getContext("2d");ctx.drawImage(img,sx,sy,sw,sh,0,0,200,200);var dataUrl=canvas.toDataURL("image/jpeg",0.9);if(cropType==="my"){myAvatarSrc=dataUrl;ls.setRaw(getPrefixed("myAvatar"),dataUrl)}else{herAvatarSrc=dataUrl;ls.setRaw(getPrefixed("herAvatar"),dataUrl)}updateAllAvatars();closeCrop()}
function bindCropEvents(){var area=document.getElementById("cropPreviewArea");var rect=document.getElementById("cropRect");rect.addEventListener("mousedown",function(e){if(e.target===rect){isDraggingRect=true;dragStartX=e.clientX;dragStartY=e.clientY;dragStartRectX=cropRectX;dragStartRectY=cropRectY;e.preventDefault()}});rect.addEventListener("touchstart",function(e){if(e.target===rect&&e.touches.length===1){isDraggingRect=true;dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;dragStartRectX=cropRectX;dragStartRectY=cropRectY;e.preventDefault()}},{passive:false});window.addEventListener("mousemove",function(e){if(isDraggingRect){cropRectX=dragStartRectX+e.clientX-dragStartX;cropRectY=dragStartRectY+e.clientY-dragStartY;updateCropDisplay()}if(isDraggingHandle){handleResize(e.clientX,e.clientY);updateCropDisplay()}});window.addEventListener("touchmove",function(e){if(isDraggingRect&&e.touches.length===1){cropRectX=dragStartRectX+e.touches[0].clientX-dragStartX;cropRectY=dragStartRectY+e.touches[0].clientY-dragStartY;updateCropDisplay();e.preventDefault()}if(isDraggingHandle&&e.touches.length===1){handleResize(e.touches[0].clientX,e.touches[0].clientY);updateCropDisplay();e.preventDefault()}},{passive:false});window.addEventListener("mouseup",function(){isDraggingRect=false;isDraggingHandle=false;activeHandle=null});window.addEventListener("touchend",function(){isDraggingRect=false;isDraggingHandle=false;activeHandle=null});var handles=rect.querySelectorAll(".crop-handle");handles.forEach(function(h){h.addEventListener("mousedown",function(e){isDraggingHandle=true;activeHandle=h.dataset.handle;dragStartX=e.clientX;dragStartY=e.clientY;dragStartRectX=cropRectX;dragStartRectY=cropRectY;dragStartRectW=cropRectW;dragStartRectH=cropRectH;e.stopPropagation();e.preventDefault()});h.addEventListener("touchstart",function(e){isDraggingHandle=true;activeHandle=h.dataset.handle;dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;dragStartRectX=cropRectX;dragStartRectY=cropRectY;dragStartRectW=cropRectW;dragStartRectH=cropRectH;e.stopPropagation();e.preventDefault()})});area.addEventListener("wheel",function(e){e.preventDefault();var delta=e.deltaY>0?-0.05:0.05;var ns=cropImgScale+delta;if(ns<0.2)ns=0.2;if(ns>5)ns=5;var areaRect=area.getBoundingClientRect();var mx=e.clientX-areaRect.left,my=e.clientY-areaRect.top;var sc=ns/cropImgScale;cropImgX=mx-(mx-cropImgX)*sc;cropImgY=my-(my-cropImgY)*sc;cropImgScale=ns;updateCropDisplay()})}
function handleResize(cx,cy){var dx=cx-dragStartX,dy=cy-dragStartY,minSize=50;switch(activeHandle){case"tl":cropRectX=dragStartRectX+dx;cropRectY=dragStartRectY+dy;cropRectW=dragStartRectW-dx;cropRectH=dragStartRectH-dy;break;case"tr":cropRectY=dragStartRectY+dy;cropRectW=dragStartRectW+dx;cropRectH=dragStartRectH-dy;break;case"bl":cropRectX=dragStartRectX+dx;cropRectW=dragStartRectW-dx;cropRectH=dragStartRectH+dy;break;case"br":cropRectW=dragStartRectW+dx;cropRectH=dragStartRectH+dy;break;case"tm":cropRectY=dragStartRectY+dy;cropRectH=dragStartRectH-dy;break;case"bm":cropRectH=dragStartRectH+dy;break;case"ml":cropRectX=dragStartRectX+dx;cropRectW=dragStartRectW-dx;break;case"mr":cropRectW=dragStartRectW+dx;break}if(cropRectW<minSize){cropRectW=minSize;if(activeHandle.indexOf("l")>=0)cropRectX=dragStartRectX+dragStartRectW-minSize}if(cropRectH<minSize){cropRectH=minSize;if(activeHandle.indexOf("t")>=0)cropRectY=dragStartRectY+dragStartRectH-minSize}}

function checkAuto(){if(!autoInterval||autoInterval<=0||isSending)return;var now=Date.now();if(now-lastUserMsgTime<autoInterval*60*1000)return;lastUserMsgTime=now;var sys=buildSystem()+"\n主动开口说话。";var xhr=new XMLHttpRequest();xhr.open("POST",API_URL,true);xhr.setRequestHeader("Content-Type","application/json");xhr.setRequestHeader("Authorization","Bearer "+getApiKey());xhr.onload=function(){if(xhr.status===200){try{var d=JSON.parse(xhr.responseText);var reply=d.choices[0].message.content.trim();if(reply){var h=getCurrentHistory();h.push({role:"assistant",content:reply});saveCurrentHistory(h);renderChat()}}catch(e){}}};xhr.send(JSON.stringify({model:getModel(),messages:[{role:"system",content:sys},{role:"user",content:"（主动）"}],max_tokens:200,temperature:0.95}))}
function toggleAutoMsg(){autoInterval=autoInterval>0?0:5;ls.set("autoInterval",autoInterval);var b=document.getElementById("autoToggleBtn");b.textContent=autoInterval>0?"主动":"手动";b.style.background=autoInterval>0?"#000":"#fff";b.style.color=autoInterval>0?"#fff":"#000";clearInterval(autoTimer);if(autoInterval>0)autoTimer=setInterval(checkAuto,autoInterval*60*1000)}

var lastUserMsgTime=Date.now()-60000;
function clearCurrentHistory(){if(!confirm("清空当前记录？"))return;saveCurrentHistory([]);renderChat()}
function applyTheme(scheme){if(scheme==="dark"){bgColor="#1a1a1a";userBubbleColor="#333333";xnBubbleColor="#ffffff";narrationBgColor="#2a2a2a";archiveBannerColor="#2a2a2a";archiveBannerTextColor="#cccccc"}else if(scheme==="light"){bgColor="#ffffff";userBubbleColor="#f0f0f0";xnBubbleColor="#000000";narrationBgColor="#f0f0ff";archiveBannerColor="#f0f0ff";archiveBannerTextColor="#4040a0"}else if(scheme==="warm"){bgColor="#f5e6d3";userBubbleColor="#fff8f0";xnBubbleColor="#4a2c1a";narrationBgColor="#f0e6d3";archiveBannerColor="#f0e6d3";archiveBannerTextColor="#4a2c1a"}document.getElementById("bgColorPicker").value=bgColor;document.getElementById("userBubbleColor").value=userBubbleColor;document.getElementById("xnBubbleColor").value=xnBubbleColor;document.getElementById("narrationBgColor").value=narrationBgColor;document.getElementById("archiveBannerColor").value=archiveBannerColor;document.getElementById("archiveBannerTextColor").value=archiveBannerTextColor;applyAppearance()}
function handleBgUpload(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){bgImageUrl=ev.target.result;ls.setRaw(getPrefixed("bg"),bgImageUrl);applyAppearance()};r.readAsDataURL(f)}
function clearBackground(){bgImageUrl=null;ls.setRaw(getPrefixed("bg"),null);applyAppearance()}
function viewMemories(){var m=ls.raw(getPrefixed("memories"))||"";var n=prompt("当前关键记忆：\n"+(m||"(空)")+"\n\n输入新记忆（每条一行）：",m);if(n!==null){ls.setRaw(getPrefixed("memories"),n||"");alert("记忆已保存！")}}
function exportArchive(){var d={time:new Date().toISOString(),archive:currentArchive,messages:getCurrentHistory()};var b=new Blob([JSON.stringify(d)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="xiuning_"+currentArchive+"_"+new Date().toISOString().slice(0,10)+".json";a.click()}
function handleImport(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);if(!d.messages)throw new Error();if(d.archive&&d.archive!==currentArchive){if(!confirm("该存档属于「"+d.archive+"」，确定导入到当前页面吗？"))return}saveCurrentHistory(d.messages);renderChat();alert("导入成功！")}catch(err){alert("格式错误")}};r.readAsText(f)}
function autoResize(el){el.style.height="34px";el.style.height=Math.min(el.scrollHeight,80)+"px"}
function handleKey(e){if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg()}}

document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("settingsBtn").onclick=openSettings;
  document.getElementById("sendBtn").onclick=sendMsg;
  document.getElementById("myAvatarBtn").onclick=function(){openCrop("my")};
  document.getElementById("herAvatarBtn").onclick=function(){openCrop("her")};
  document.getElementById("narrationSendBtn").onclick=sendNarration;
  document.getElementById("narrationDisplay").onclick=clearNarration;
  document.getElementById("createArchiveBtn").onclick=createArchive;
  document.getElementById("addScheduleBtn").onclick=addSchedule;
  document.getElementById("msgInput").onkeydown=handleKey;
  document.getElementById("msgInput").oninput=function(){autoResize(this)};
  document.getElementById("autoToggleBtn").onclick=toggleAutoMsg;
  document.getElementById("settingsModal").onclick=function(e){if(e.target===this)closeSettings()};
  document.getElementById("cropModal").onclick=function(e){if(e.target===this)closeCrop()};
  document.querySelectorAll(".setting-tabs button").forEach(function(btn){btn.onclick=function(){switchSettingTab(this.dataset.tab)}});
  bindCropEvents();
  applyCustomCss();reloadAllSettings();updateArchiveBanner();
  setInterval(checkSchedule,60000);
  checkSchedule();
  if(autoInterval>0)autoTimer=setInterval(checkAuto,autoInterval*60*1000);
  toggleAutoMsg();if(autoInterval>0)toggleAutoMsg();
});
</script>
</body>
