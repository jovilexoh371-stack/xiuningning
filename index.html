<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>与修宁</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="修宁">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;height:100dvh}
body{font-family:"SimSun","Noto Serif SC",serif;height:100vh;height:100dvh;display:flex;justify-content:center;align-items:center;background:#ede8e3;overscroll-behavior:none;overflow:hidden;position:fixed;width:100%;touch-action:manipulation}
#app{width:100%;max-width:100vw;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#fff;position:relative;overflow:hidden;margin:0 auto;touch-action:pan-y}
.bg-layer{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;background-repeat:no-repeat;opacity:0.85}
.content-layer{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;background:rgba(255,255,255,0.75);height:100%;overflow:hidden;min-height:0}
#header{background:rgba(255,255,255,0.9);border-bottom:1px solid #000;padding:10px 16px;padding-top:calc(10px + env(safe-area-inset-top));display:flex;align-items:center;gap:8px;flex-shrink:0}
#header img{width:30px;height:30px;border-radius:50%;border:1px solid #000;object-fit:cover}
#header .name{font-size:15px;font-weight:600;flex:1}
#narrationBar{display:flex;gap:4px;padding:4px 10px;border-bottom:1px solid #000;background:rgba(255,255,255,0.8);align-items:center;flex-shrink:0}
#narrationInput{flex:1;border:1px solid #000;border-radius:4px;padding:3px 6px;font-size:10px;outline:none;font-family:inherit;background:#fff}
#narrationSend{border:1px solid #000;background:#000;color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer}
#archiveBanner{display:none;padding:6px 12px;border-bottom:1px solid #000;font-size:11px;justify-content:space-between;align-items:center;flex-shrink:0;background:#f0f0ff;color:#4040a0}
#archiveBanner button{background:#e0e0ff;border:1px solid #000;padding:3px 10px;border-radius:4px;font-size:10px;cursor:pointer}
.chat-area{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;overscroll-behavior:none;touch-action:pan-y;min-height:0}
.msg-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:3px}
.msg-row.user{justify-content:flex-end}
.msg-row.xn{justify-content:flex-start}
.avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1px solid #000;overflow:hidden;background:#f5f5f5}
.avatar img{width:100%;height:100%;object-fit:cover}
.bubble-wrapper{display:flex;flex-direction:column;min-width:0;flex-shrink:1;max-width:75%}
.bubble-wrapper.user-wrapper{align-items:flex-end}
.bubble-wrapper.xn-wrapper{align-items:flex-start}
.bubble{padding:5px 9px;font-size:13px;line-height:1.6;word-break:break-word;white-space:pre-wrap;border:1px solid #000;border-radius:5px;overflow-wrap:break-word;writing-mode:horizontal-tb !important}
.bubble.user{background:#fff;color:#000}
.bubble.xn{background:#000;color:#fff}
.msg-time{font-size:8px;color:#aaa;margin-top:2px}
.msg-actions{display:flex;gap:3px;margin-top:3px;opacity:0.7;flex-wrap:wrap}
.msg-actions button{background:none;border:none;font-size:9px;cursor:pointer;color:#888;padding:1px 5px}
.narration-msg{text-align:center;color:#555;font-size:12px;padding:8px 16px;margin:6px 0;border-radius:8px;background:#f4f4f9;border:1px dashed #bbb;word-break:break-word;white-space:pre-wrap;max-width:92%;align-self:center;line-height:1.5}
.narration-msg .narration-actions{display:flex;justify-content:center;gap:8px;margin-top:5px}
.narration-msg .narration-actions button{font-size:10px;background:none;border:none;color:#999;cursor:pointer;padding:2px 6px}
.input-area{border-top:1px solid #000;padding:6px 10px;padding-bottom:calc(6px + env(safe-area-inset-bottom));display:flex;gap:6px;background:rgba(255,255,255,0.95);flex-shrink:0;align-items:flex-end}
.input-area textarea{flex:1;border:1px solid #000;border-radius:6px;padding:6px 10px;font-size:12px;outline:none;resize:none;height:34px;max-height:80px;overflow-y:auto;line-height:1.4;font-family:inherit;background:#fff;color:#000}
.input-area button{background:#000;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;flex-shrink:0}
.input-area button:disabled{background:#ccc}
#autoToggleBtn{border:1px solid #000;background:#000;color:#fff;padding:4px 8px;font-size:10px;cursor:pointer;border-radius:4px;margin-right:auto;font-family:inherit;flex-shrink:0}
#fileSendBtn{background:#fff;color:#000;border:1px solid #000;padding:4px 8px;font-size:12px;cursor:pointer;border-radius:6px;margin-right:2px;flex-shrink:0}
.typing-indicator{display:flex;align-items:center;gap:4px;padding:6px 10px;align-self:flex-start;flex-shrink:0}
.typing-indicator .typing-avatar{width:24px;height:24px;border-radius:50%;border:1px solid #000;overflow:hidden;flex-shrink:0}
.typing-indicator .typing-avatar img{width:100%;height:100%;object-fit:cover}
.typing-dots{display:flex;gap:4px}
.typing-dots span{width:5px;height:5px;background:#aaa;border-radius:50%;animation:blink 1.2s infinite}
.typing-dots span:nth-child(2){animation-delay:0.2s}
.typing-dots span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border:1px solid #000;border-radius:8px;width:90%;max-width:500px;max-height:85vh;max-height:85dvh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.15);overflow:hidden}
.setting-tabs{display:flex;border-bottom:1px solid #000;background:#f5f5f5;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.setting-tabs button{flex-shrink:0;padding:10px 14px;font-size:11px;border:none;background:transparent;cursor:pointer;font-family:inherit;color:#666;border-bottom:2px solid transparent;white-space:nowrap}
.setting-tabs button.active{color:#000;border-bottom-color:#000;font-weight:600}
.setting-pages{flex:1;overflow-y:auto;padding:20px;overscroll-behavior:contain;touch-action:pan-y}
.setting-page{display:none}
.setting-page.active{display:block}
.setting-page label{font-size:12px;color:#666;display:block;margin-bottom:3px;margin-top:12px}
.setting-page textarea{width:100%;border:1px solid #000;border-radius:4px;padding:10px 12px;font-size:12px;font-family:inherit;resize:vertical;height:100px;background:#fafafa;overflow-y:auto}
.setting-page input[type=text],.setting-page input[type=number]{width:100%;border:1px solid #000;border-radius:4px;padding:8px 12px;font-size:12px;font-family:inherit;background:#fafafa}
.setting-page .color-row{display:flex;gap:8px;align-items:center;margin-top:4px}
.setting-page .color-row input[type=color]{width:36px;height:36px;border:1px solid #000;border-radius:4px;cursor:pointer}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;border-top:1px solid #eee;flex-shrink:0;padding:12px 20px}
.modal-btns button{padding:6px 14px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid #000;background:#f5f5f5;font-family:inherit}
.modal-btns .primary{background:#000;color:#fff;border-color:#000}
.archive-list-item{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;margin:2px 0;background:#fafafa;border:1px solid #000;border-radius:4px;font-size:11px}
.archive-list-item button{border:1px solid #000;background:#f5f5f5;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;margin-left:4px;font-family:inherit}
.schedule-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;margin:4px 0;background:#fafafa;border:1px solid #000;border-radius:4px;font-size:11px}
.schedule-item button{border:1px solid #000;background:#f5f5f5;padding:3px 8px;border-radius:4px;font-size:10px;cursor:pointer;margin-left:4px;font-family:inherit}
.crop-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center}
.crop-overlay.show{display:flex}
.crop-box{background:#fff;border:1px solid #000;border-radius:8px;padding:20px;width:90%;max-width:450px}
.crop-preview-area{width:100%;height:300px;background:#e0e0e0;margin:10px 0;position:relative;overflow:hidden;border:1px solid #ccc;border-radius:4px;touch-action:none;cursor:move}
#cropImage{position:absolute;top:0;left:0;max-width:none;transform-origin:0 0;pointer-events:none;display:block;-webkit-user-drag:none}
.crop-rect{position:absolute;border:2px solid #f5a623;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);cursor:move;z-index:2;touch-action:none}
.crop-handle{position:absolute;width:24px;height:24px;background:#f5a623;border:2px solid #fff;border-radius:4px;pointer-events:auto;z-index:3;touch-action:none}
.crop-handle.tl{top:-12px;left:-12px;cursor:nwse-resize}
.crop-handle.tr{top:-12px;right:-12px;cursor:nesw-resize}
.crop-handle.bl{bottom:-12px;left:-12px;cursor:nesw-resize}
.crop-handle.br{bottom:-12px;right:-12px;cursor:nwse-resize}
.crop-handle.tm{top:-12px;left:50%;margin-left:-12px;cursor:ns-resize}
.crop-handle.bm{bottom:-12px;left:50%;margin-left:-12px;cursor:ns-resize}
.crop-handle.ml{top:50%;left:-12px;margin-top:-12px;cursor:ew-resize}
.crop-handle.mr{top:50%;right:-12px;margin-top:-12px;cursor:ew-resize}
#toast-container{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.toast-msg{background:rgba(0,0,0,0.75);color:#fff;padding:7px 18px;border-radius:20px;font-size:12px;font-family:"SimSun","Noto Serif SC",serif;opacity:0;transition:opacity 0.3s;white-space:nowrap;max-width:90vw;text-align:center}
.toast-msg.show{opacity:1}
</style>
</head>
<body>
<div id="app">
<div id="bgImg" class="bg-layer" style="background-image:none"></div>
<div class="content-layer">
<div id="header">
<img id="headerHerAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%23d9d9d9'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.3em' font-size='20'%3E蛇%3C/text%3E%3C/svg%3E">
<span class="name">修宁</span>
<img id="headerMyAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%23fce4d6'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.3em' font-size='20'%3E花%3C/text%3E%3C/svg%3E">
<button id="settingsBtn" style="border:1px solid #000;background:#fff;padding:3px 8px;font-size:11px;cursor:pointer;border-radius:4px">设置</button>
</div>
<div id="archiveBanner"><span>存档：<strong id="archiveName"></strong></span><button onclick="exitArchive()">返回主线</button></div>
<div id="narrationBar"><input type="text" id="narrationInput" placeholder="输入旁白..."><button id="narrationSendBtn">发送</button></div>
<div class="chat-area" id="chat"></div>
<div id="typingIndicator" class="typing-indicator" style="display:none">
<div class="typing-avatar"><img id="typingAvatarImg" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' fill='%23d9d9d9'/%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dy='.3em' font-size='20'%3E蛇%3C/text%3E%3C/svg%3E" style="width:100%;height:100%;object-fit:cover"></div>
<div class="typing-dots"><span></span><span></span><span></span></div>
</div>
<div class="input-area">
<button id="autoToggleBtn">主动</button>
<button id="fileSendBtn" onclick="sendFile()">文件</button>
<textarea id="msgInput" placeholder="对修宁说..." rows="1"></textarea>
<button id="sendBtn">发送</button>
</div>
</div>
</div>
<div id="toast-container"></div>

<!-- 设置弹窗 -->
<div class="modal-overlay" id="settingsModal">
<div class="modal-box">
<div class="setting-tabs">
<button class="active" data-tab="tab-basic">基础</button>
<button data-tab="tab-persona">人设</button>
<button data-tab="tab-appearance">外观</button>
<button data-tab="tab-archive">存档</button>
<button data-tab="tab-schedule">定时</button>
<button data-tab="tab-advanced">高级</button>
</div>
<div class="setting-pages">
<div class="setting-page active" id="tab-basic">
<label>API Key</label><input type="text" id="apiKeyEdit" placeholder="sk-...">
<label>模型</label><input type="text" id="modelEdit" placeholder="gpt-3.5-turbo">
<label>她的名字</label><input type="text" id="herNameEdit" placeholder="修宁">
<label>我的名字</label><input type="text" id="myNameEdit" placeholder="我">
<label>上下文条数</label><input type="number" id="ctxCountEdit" min="4" max="100" value="40">
<label>字体大小(px)</label><input type="number" id="fontSizeEdit" min="10" max="22" value="13">
<label>气泡最大宽度(%)</label><input type="number" id="bubbleWidthEdit" min="40" max="95" value="75">
<label>主动消息间隔(分钟，0=关闭)</label><input type="number" id="autoIntervalEdit" min="0" value="5">
<div style="display:flex;gap:8px;margin-top:4px">
<button id="herAvatarBtn" style="flex:1;border:1px solid #000;background:#f5f5f5;padding:6px;font-size:11px;cursor:pointer;border-radius:4px">设置她的头像</button>
<button id="myAvatarBtn" style="flex:1;border:1px solid #000;background:#f5f5f5;padding:6px;font-size:11px;cursor:pointer;border-radius:4px">设置我的头像</button>
</div>
<div style="display:flex;gap:8px;margin-top:8px">
<button id="testNotifyBtn" style="flex:1;border:1px solid #000;background:#f5f5f5;padding:6px;font-size:11px;cursor:pointer;border-radius:4px">测试通知</button>
<button id="reqNotifyBtn" style="flex:1;border:1px solid #000;background:#f5f5f5;padding:6px;font-size:11px;cursor:pointer;border-radius:4px">开启通知权限</button>
</div>
</div>
<div class="setting-page" id="tab-persona">
<label>强制修正指令</label><textarea id="overrideEdit"></textarea>
<label>核心人设</label><textarea id="personaEdit"></textarea>
<label>外貌描写</label><textarea id="appearanceEdit"></textarea>
<label>自我认知</label><textarea id="selfCognitionEdit"></textarea>
<label>世界观</label><textarea id="worldviewEdit"></textarea>
<label>经历/背景故事</label><textarea id="backstoryEdit"></textarea>
<label>与陈幺幺的羁绊</label><textarea id="bondEdit"></textarea>
<label>陈幺幺的人设</label><textarea id="yaoyaoEdit"></textarea>
<label>行动准则与动机</label><textarea id="motivationEdit"></textarea>
<label>关键记忆</label><textarea id="memoriesEdit"></textarea>
</div>
<div class="setting-page" id="tab-appearance">
<label>主题快速应用</label>
<div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap">
<button onclick="applyTheme('light')" style="border:1px solid #000;background:#f5f5f5;padding:4px 10px;font-size:11px;cursor:pointer;border-radius:4px">浅色</button>
<button onclick="applyTheme('dark')" style="border:1px solid #000;background:#222;color:#fff;padding:4px 10px;font-size:11px;cursor:pointer;border-radius:4px">深色</button>
<button onclick="applyTheme('warm')" style="border:1px solid #000;background:#f5e6d3;padding:4px 10px;font-size:11px;cursor:pointer;border-radius:4px">暖色</button>
</div>
<label>背景颜色</label><div class="color-row"><input type="color" id="bgColorPicker" value="#ede8e3"></div>
<label>背景图片</label>
<div style="display:flex;gap:6px;margin-top:4px">
<button onclick="openCrop('bg')" style="flex:1;border:1px solid #000;background:#f5f5f5;padding:6px;font-size:11px;cursor:pointer;border-radius:4px">上传并裁剪背景</button>
<button onclick="clearBackground()" style="border:1px solid #000;background:#f5f5f5;padding:6px 10px;font-size:11px;cursor:pointer;border-radius:4px">清除</button>
</div>
<label>用户气泡颜色</label><div class="color-row"><input type="color" id="userBubbleColor" value="#ffffff"></div>
<label>AI气泡颜色</label><div class="color-row"><input type="color" id="xnBubbleColor" value="#000000"></div>
<label>旁白背景颜色</label><div class="color-row"><input type="color" id="narrationBgColor" value="#f4f4f9"></div>
<label>存档Banner背景色</label><div class="color-row"><input type="color" id="archiveBannerColor" value="#f0f0ff"></div>
<label>存档Banner文字色</label><div class="color-row"><input type="color" id="archiveBannerTextColor" value="#4040a0"></div>
</div>
<div class="setting-page" id="tab-archive">
<label>创建新存档</label><input type="text" id="newArchiveName" placeholder="存档名称（唯一）">
<div style="margin-top:6px"><button id="createArchiveBtn" style="border:1px solid #000;background:#000;color:#fff;padding:6px 14px;font-size:11px;cursor:pointer;border-radius:4px">创建存档</button></div>
<label style="margin-top:14px">存档列表</label><div id="archiveList"></div>
<div style="margin-top:14px;display:flex;gap:6px;flex-wrap:wrap">
<button onclick="exportArchive()" style="border:1px solid #000;background:#f5f5f5;padding:6px 12px;font-size:11px;cursor:pointer;border-radius:4px">导出当前存档</button>
<label style="margin:0"><input type="file" accept=".json" onchange="handleImport(event)" style="display:none"><button onclick="this.parentElement.querySelector('input').click()" style="border:1px solid #000;background:#f5f5f5;padding:6px 12px;font-size:11px;cursor:pointer;border-radius:4px">导入存档</button></label>
<button onclick="clearCurrentHistory()" style="border:1px solid #c00;color:#c00;background:#fff;padding:6px 12px;font-size:11px;cursor:pointer;border-radius:4px">清空当前记录</button>
</div>
</div>
<div class="setting-page" id="tab-schedule">
<label>触发时间 (HH:MM)</label><input type="text" id="scheduleTime" placeholder="例如 08:00">
<label>消息内容</label><textarea id="scheduleContent" placeholder="定时发送的消息..." style="height:60px"></textarea>
<div style="margin-top:6px"><button id="addScheduleBtn" style="border:1px solid #000;background:#000;color:#fff;padding:6px 14px;font-size:11px;cursor:pointer;border-radius:4px">添加定时消息</button></div>
<label style="margin-top:14px">定时列表</label><div id="scheduleList"></div>
<div style="font-size:10px;color:#888;margin-top:8px;line-height:1.5">提示：PWA 模式下定时消息需要 APP 后台挂着才能弹。如果 APP 进程被系统杀掉，定时不会触发。</div>
</div>
<div class="setting-page" id="tab-advanced">
<label>自定义CSS</label><textarea id="customCssEdit" placeholder="/* 自定义样式 */" style="height:150px;font-family:monospace"></textarea>
</div>
</div>
<div class="modal-btns">
<button onclick="closeSettings()">取消</button>
<button class="primary" onclick="saveSettings()">保存</button>
</div>
</div>
</div>

<!-- 裁剪弹窗 -->
<div class="crop-overlay" id="cropModal">
<div class="crop-box">
<div style="font-size:13px;font-weight:600;margin-bottom:6px">裁剪图片</div>
<div class="crop-preview-area" id="cropPreviewArea">
<img id="cropImage" style="display:block">
<div class="crop-rect" id="cropRect">
<div class="crop-handle tl" data-handle="tl"></div><div class="crop-handle tr" data-handle="tr"></div>
<div class="crop-handle bl" data-handle="bl"></div><div class="crop-handle br" data-handle="br"></div>
<div class="crop-handle tm" data-handle="tm"></div><div class="crop-handle bm" data-handle="bm"></div>
<div class="crop-handle ml" data-handle="ml"></div><div class="crop-handle mr" data-handle="mr"></div>
</div>
</div>
<div style="font-size:10px;color:#999;margin-bottom:8px">滚轮/双指缩放图片，拖动空白处移动图片，拖动橙框调整裁剪</div>
<div style="display:flex;gap:8px;justify-content:flex-end">
<button onclick="closeCrop()" style="border:1px solid #000;background:#f5f5f5;padding:6px 14px;font-size:12px;cursor:pointer;border-radius:4px">取消</button>
<button onclick="confirmCrop()" style="border:none;background:#000;color:#fff;padding:6px 14px;font-size:12px;cursor:pointer;border-radius:4px">确认裁剪</button>
</div>
</div>
</div>

<script>
/* ============ MYLOVE 通知模块 - PWA 版 ============ */
var MYLOVE_NOTIFY = (function(){
  var swReg = null;

  function isSupported(){
    return 'Notification' in window && 'serviceWorker' in navigator;
  }

  function registerSW(){
    if(!('serviceWorker' in navigator)) return Promise.resolve(null);
    return navigator.serviceWorker.register('./sw.js').then(function(reg){
      swReg = reg;
      console.log('SW 注册成功', reg.scope);

function buildAIMessages(branchMessages, excludeMsgId, extraSysContent){

  for(var i=msgs.length-1; i>=0; i--){

  var sysContent = buildSystemRaw();

  }
  var ctxArr = [];
  for(var i=0; i<msgs.length; i++){
    var m = msgs[i];

      ctxArr.push({role:"user", content:"（场景描述：" + m.content + "）"});

      ctxArr.push({role:m.role, content:m.content});

  ctxArr = ctxArr.slice(-ctxLimit);
  while(ctxArr.length>0 && ctxArr[0].role==="assistant"){

  if(ctxArr.length===0){
    if(lastNarration){
      ctxArr.push({role:"user", content:"（场景：" + lastNarration + "）请根据当前场景开始对话。"});
    }else{
      ctxArr.push({role:"user", content:"（请开始对话）"});

    }

}

/* ============ 裁剪功能 ============ */
function openCrop(a){
  cropType=a;
  isDraggingRect=false;isDraggingHandle=false;activeHandle=null;
  isDraggingImg=false;isPinching=false;
  document.getElementById("cropModal").classList.add("show");
  var b=document.createElement("input");b.type="file";b.accept="image/*";
  b.onchange=function(c){
    var d=c.target.files[0];if(!d){closeCrop();return;}
    var e=new FileReader();
    e.onload=function(f){
      var img=document.getElementById("cropImage");
      img.onload=function(){
        cropImageNaturalWidth=img.naturalWidth;
        cropImageNaturalHeight=img.naturalHeight;
        var area=document.getElementById("cropPreviewArea");
        var aw=area.clientWidth, ah=area.clientHeight;
        cropImgScale=Math.min(aw/img.naturalWidth, ah/img.naturalHeight);
        cropImgX=(aw-img.naturalWidth*cropImgScale)/2;
        cropImgY=(ah-img.naturalHeight*cropImgScale)/2;
        if(cropType==="bg"){
          cropRectW=aw*0.9; cropRectH=ah*0.9;
          cropRectX=(aw-cropRectW)/2; cropRectY=(ah-cropRectH)/2;
        }else{
          var s=Math.min(aw,ah)*0.7;
          cropRectW=s; cropRectH=s;
          cropRectX=(aw-s)/2; cropRectY=(ah-s)/2;
        }
        updateCropDisplay();
      };
      img.src=f.target.result;
    };
    e.readAsDataURL(d);
  };
  b.click();
}

function updateCropDisplay(){
  var a=document.getElementById("cropImage");var b=document.getElementById("cropRect");
  a.style.transform="translate("+cropImgX+"px, "+cropImgY+"px) scale("+cropImgScale+")";
  a.style.transformOrigin="0 0";
  b.style.left=cropRectX+"px";b.style.top=cropRectY+"px";
  b.style.width=cropRectW+"px";b.style.height=cropRectH+"px";
}

function closeCrop(){
  document.getElementById("cropModal").classList.remove("show");
  isDraggingRect=false;isDraggingHandle=false;activeHandle=null;
  isDraggingImg=false;isPinching=false;
  var img=document.getElementById("cropImage");
  if(img){img.src="";img.onload=null;}
  cropImgScale=1;cropImgX=0;cropImgY=0;
  cropRectX=0;cropRectY=0;cropRectW=100;cropRectH=100;
  cropImageNaturalWidth=0;cropImageNaturalHeight=0;
}

function confirmCrop(){
  var a=document.getElementById("cropImage");
  if(!a.src||!a.naturalWidth){alert("请先上传图片");return;}
  var b=(cropRectX-cropImgX)/cropImgScale;
  var c=(cropRectY-cropImgY)/cropImgScale;
  var d=cropRectW/cropImgScale, e=cropRectH/cropImgScale;
  b=Math.max(0,b); c=Math.max(0,c);
  d=Math.min(d, cropImageNaturalWidth-b);
  e=Math.min(e, cropImageNaturalHeight-c);
  if(cropType==="my"||cropType==="her"){
    var f=Math.min(d,e); d=f; e=f;
  }
  if(d<=0||e<=0){alert("裁剪区域无效");return;}
  var cw,ch;
  if(cropType==="bg"){
    var maxSide=1280;
    var ratio=Math.min(1, maxSide/Math.max(d,e));
    cw=Math.round(d*ratio); ch=Math.round(e*ratio);
  }else{
    cw=200; ch=200;
  }
  var g=document.createElement("canvas");
  g.width=cw; g.height=ch;
  var h=g.getContext("2d");
  h.drawImage(a, b, c, d, e, 0, 0, cw, ch);
  var i=g.toDataURL("image/jpeg", 0.9);
  if(cropType==="my"){
    myAvatarSrc=i;ls.setRaw(getPrefixed("myAvatar"),i);updateAllAvatars();
  }else if(cropType==="her"){
    herAvatarSrc=i;ls.setRaw(getPrefixed("herAvatar"),i);updateAllAvatars();
  }else if(cropType==="bg"){
    bgImageUrl=i;ls.setRaw(getPrefixed("bg"),i);applyAppearance();
  }
  closeCrop();
}

function bindCropEvents(){
  var area=document.getElementById("cropPreviewArea");
  var rect=document.getElementById("cropRect");
  
  rect.addEventListener("mousedown",function(c){
    if(c.target===rect){
      isDraggingRect=true;
      dragStartX=c.clientX;dragStartY=c.clientY;
      dragStartRectX=cropRectX;dragStartRectY=cropRectY;
      c.preventDefault();
    }
  });
  rect.addEventListener("touchstart",function(c){
    if(c.target===rect&&c.touches.length===1){
      isDraggingRect=true;
      dragStartX=c.touches[0].clientX;dragStartY=c.touches[0].clientY;
      dragStartRectX=cropRectX;dragStartRectY=cropRectY;
      c.preventDefault();
    }
  },{passive:false});
  
  area.addEventListener("mousedown",function(c){
    if(c.target===area||c.target.id==="cropImage"){
      isDraggingRect=false;isDraggingHandle=false;
      isDraggingImg=true;
      imgStartX=c.clientX;imgStartY=c.clientY;
      imgInitX=cropImgX;imgInitY=cropImgY;
      c.preventDefault();
    }
  });
  area.addEventListener("touchstart",function(c){
    if(c.touches.length===2){
      isPinching=true;
      isDraggingImg=false;isDraggingRect=false;isDraggingHandle=false;
      var dx=c.touches[0].clientX-c.touches[1].clientX;
      var dy=c.touches[0].clientY-c.touches[1].clientY;
      pinchInitDist=Math.sqrt(dx*dx+dy*dy);
      pinchInitScale=cropImgScale;
      var areaRect=area.getBoundingClientRect();
      pinchCx=(c.touches[0].clientX+c.touches[1].clientX)/2-areaRect.left;
      pinchCy=(c.touches[0].clientY+c.touches[1].clientY)/2-areaRect.top;
      pinchInitImgX=cropImgX;pinchInitImgY=cropImgY;
      c.preventDefault();return;
    }
    if((c.target===area||c.target.id==="cropImage")&&c.touches.length===1){
      isDraggingImg=true;
      imgStartX=c.touches[0].clientX;imgStartY=c.touches[0].clientY;
      imgInitX=cropImgX;imgInitY=cropImgY;
      c.preventDefault();
    }
  },{passive:false});
  
  window.addEventListener("mousemove",function(c){
    if(isDraggingRect){
      cropRectX=dragStartRectX+c.clientX-dragStartX;
      cropRectY=dragStartRectY+c.clientY-dragStartY;
      updateCropDisplay();
    }
    if(isDraggingHandle){
      handleResize(c.clientX,c.clientY);updateCropDisplay();
    }
    if(isDraggingImg){
      cropImgX=imgInitX+c.clientX-imgStartX;
      cropImgY=imgInitY+c.clientY-imgStartY;
      updateCropDisplay();
    }
  });
  window.addEventListener("touchmove",function(c){
    if(isPinching&&c.touches.length===2){
      var dx=c.touches[0].clientX-c.touches[1].clientX;
      var dy=c.touches[0].clientY-c.touches[1].clientY;
      var newDist=Math.sqrt(dx*dx+dy*dy);
      if(pinchInitDist>0){
        var newScale=Math.max(0.1,Math.min(8,pinchInitScale*(newDist/pinchInitDist)));
        var ratio=newScale/pinchInitScale;
        cropImgX=pinchCx-(pinchCx-pinchInitImgX)*ratio;
        cropImgY=pinchCy-(pinchCy-pinchInitImgY)*ratio;
        cropImgScale=newScale;
        updateCropDisplay();
      }
      c.preventDefault();return;
    }
    if(isDraggingRect&&c.touches.length===1){
      cropRectX=dragStartRectX+c.touches[0].clientX-dragStartX;
      cropRectY=dragStartRectY+c.touches[0].clientY-dragStartY;
      updateCropDisplay();c.preventDefault();
    }
    if(isDraggingHandle&&c.touches.length===1){
      handleResize(c.touches[0].clientX,c.touches[0].clientY);
      updateCropDisplay();c.preventDefault();
    }
    if(isDraggingImg&&c.touches.length===1){
      cropImgX=imgInitX+c.touches[0].clientX-imgStartX;
      cropImgY=imgInitY+c.touches[0].clientY-imgStartY;
      updateCropDisplay();c.preventDefault();
    }
  },{passive:false});
  
  window.addEventListener("mouseup",function(){
    isDraggingRect=false;isDraggingHandle=false;activeHandle=null;
    isDraggingImg=false;
  });
  window.addEventListener("touchend",function(c){
    if(c.touches.length<2)isPinching=false;
    if(c.touches.length===0){
      isDraggingRect=false;isDraggingHandle=false;activeHandle=null;
      isDraggingImg=false;
    }
  });
  
  var handles=rect.querySelectorAll(".crop-handle");
  handles.forEach(function(d){
    d.addEventListener("mousedown",function(e){
      isDraggingHandle=true;activeHandle=d.dataset.handle;
      dragStartX=e.clientX;dragStartY=e.clientY;
      dragStartRectX=cropRectX;dragStartRectY=cropRectY;
      dragStartRectW=cropRectW;dragStartRectH=cropRectH;
      e.stopPropagation();e.preventDefault();
    });
    d.addEventListener("touchstart",function(e){
      if(e.touches.length===1){
        isDraggingHandle=true;activeHandle=d.dataset.handle;
        dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;
        dragStartRectX=cropRectX;dragStartRectY=cropRectY;
        dragStartRectW=cropRectW;dragStartRectH=cropRectH;
        e.stopPropagation();e.preventDefault();
      }
    },{passive:false});
  });
  
  area.addEventListener("wheel",function(b){
    b.preventDefault();
    var c=b.deltaY>0?-0.05:0.05;
    var d=Math.max(0.1,Math.min(8,cropImgScale+c));
    var e=area.getBoundingClientRect();
    var f=b.clientX-e.left, gg=b.clientY-e.top;
    var hh=d/cropImgScale;
    cropImgX=f-(f-cropImgX)*hh;
    cropImgY=gg-(gg-cropImgY)*hh;
    cropImgScale=d;
    updateCropDisplay();
  },{passive:false});
}

function handleResize(a,b){
  var c=a-dragStartX,d=b-dragStartY,e=50;
  switch(activeHandle){
    case"tl":cropRectX=dragStartRectX+c;cropRectY=dragStartRectY+d;cropRectW=dragStartRectW-c;cropRectH=dragStartRectH-d;break;
    case"tr":cropRectY=dragStartRectY+d;cropRectW=dragStartRectW+c;cropRectH=dragStartRectH-d;break;
    case"bl":cropRectX=dragStartRectX+c;cropRectW=dragStartRectW-c;cropRectH=dragStartRectH+d;break;
    case"br":cropRectW=dragStartRectW+c;cropRectH=dragStartRectH+d;break;
    case"tm":cropRectY=dragStartRectY+d;cropRectH=dragStartRectH-d;break;
    case"bm":cropRectH=dragStartRectH+d;break;
    case"ml":cropRectX=dragStartRectX+c;cropRectW=dragStartRectW-c;break;
    case"mr":cropRectW=dragStartRectW+c;break;
  }
  if(cropRectW<e){cropRectW=e;if(activeHandle.indexOf("l")>=0)cropRectX=dragStartRectX+dragStartRectW-e;}
  if(cropRectH<e){cropRectH=e;if(activeHandle.indexOf("t")>=0)cropRectY=dragStartRectY+dragStartRectH-e;}
}

function applyTheme(a){if(a==="dark"){bgColor="#1a1a1a";userBubbleColor="#333333";xnBubbleColor="#ffffff";narrationMsgBg="#2a2a2a";archiveBannerColor="#2a2a2a";archiveBannerTextColor="#cccccc";}else if(a==="light"){bgColor="#ffffff";userBubbleColor="#f0f0f0";xnBubbleColor="#000000";narrationMsgBg="#f0f0ff";archiveBannerColor="#f0f0ff";archiveBannerTextColor="#4040a0";}else if(a==="warm"){bgColor="#f5e6d3";userBubbleColor="#fff8f0";xnBubbleColor="#4a2c1a";narrationMsgBg="#f0e6d3";archiveBannerColor="#f0e6d3";archiveBannerTextColor="#4a2c1a";}document.getElementById("bgColorPicker").value=bgColor;document.getElementById("userBubbleColor").value=userBubbleColor;document.getElementById("xnBubbleColor").value=xnBubbleColor;document.getElementById("narrationBgColor").value=narrationMsgBg;document.getElementById("archiveBannerColor").value=archiveBannerColor;document.getElementById("archiveBannerTextColor").value=archiveBannerTextColor;applyAppearance();}

  var a={

    bond:ls.raw(getPrefixed("bond"))||"",
    yaoyao:ls.raw(getPrefixed("yaoyao"))||"",
    motivation:ls.raw(getPrefixed("motivation"))||"",

    bg:ls.raw(getPrefixed("bg"))||""
  };
  var b={time:new Date().toISOString(),archive:currentArchive,messages:getCurrentHistory(),settings:a};
  var c=JSON.stringify(b,null,2);
  var d=new Blob([c],{type:"application/json"});
  var e=URL.createObjectURL(d);
  var f=currentArchive.replace(/[^\w\-]/g,"_");
  var g=document.createElement("a");
  g.href=e;
  g.download="xiuning_"+f+"_"+new Date().toISOString().slice(0,10)+".json";
  document.body.appendChild(g);g.click();document.body.removeChild(g);
  URL.revokeObjectURL(e);
  toast("导出成功 ✓");
}

function handleImport(a){
  var b=a.target.files[0];if(!b)return;
  var c=new FileReader();
  c.onload=function(d){
    try{
      var e=JSON.parse(d.target.result);
      if(!e.messages)throw new Error("无messages字段");
      if(e.archive&&e.archive!==currentArchive){
        if(!confirm("该存档属于「"+e.archive+"」，确定导入到当前页面吗？"))return;
      }
      if(e.settings){
        var s=e.settings;
        if(s.herName)ls.setRaw("herName",s.herName);
        if(s.myName)ls.setRaw("myName",s.myName);
        if(s.fontSize)ls.set(getPrefixed("fontSize"),s.fontSize);
        if(s.bubbleWidth)ls.set(getPrefixed("bubbleWidth"),s.bubbleWidth);
        var personaKeys=["override","persona","appearance","selfCognition","worldview","backstory","bond","yaoyao","motivation","memories"];
        personaKeys.forEach(function(k){
          if(s[k]!==undefined)ls.setRaw(getPrefixed(k),s[k]||"");
        });
        var appearanceKeys=["bgColor","userBubbleColor","xnBubbleColor","narrationBgColor","archiveBannerColor","archiveBannerTextColor"];
        appearanceKeys.forEach(function(k){
          if(s[k])ls.setRaw(getPrefixed(k),s[k]);
        });
        if(s.myAvatar)ls.setRaw(getPrefixed("myAvatar"),s.myAvatar);
        if(s.herAvatar)ls.setRaw(getPrefixed("herAvatar"),s.herAvatar);
        if(s.bg)ls.setRaw(getPrefixed("bg"),s.bg);
      }
      saveCurrentHistory(e.messages);
      currentBranchId="main";setSavedCurrentBranchId("main");
      reloadAllSettings();applyAppearance();renderChat();
      alert("导入成功！");
    }catch(f){
      alert("格式错误："+f.message);
    }
  };
  c.readAsText(b);
  a.target.value="";
}

function autoResize(a){a.style.height="34px";a.style.height=Math.min(a.scrollHeight,80)+"px";}
function handleKey(a){if(a.key==="Enter"&&!a.shiftKey){a.preventDefault();sendMsg();}}
function clearCurrentHistory(){if(!confirm("清空当前记录？"))return;saveCurrentHistory([]);renderChat();}

function migrateOldHistory(){
  var a=getCurrentHistory();
  if(!Array.isArray(a)||a.length===0)return;
  var b=false,c=null;
  for(var d=0;d<a.length;d++){
    var e=a[d];
    if(!e.id){e.id=generateId();b=true;}
    if(!e.branchId){e.branchId="main";b=true;}
    if(e.parentId===undefined){e.parentId=c;b=true;}
    if(!e.versionGroupId){e.versionGroupId=e.id;b=true;}
    if(e.role==="assistant")ensureAllVersions(e);
    c=e.id;
  }
  if(b)saveCurrentHistory(a);
}
